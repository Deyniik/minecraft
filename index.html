<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Рекомендации</title>
    <!-- Open Graph метатеги для предпросмотра в соцсетях -->
    <meta property="og:title" content="Deynik Minecraft" id="og-title">
    <meta property="og:description" content="Лучшие проекты для Minecraft" id="og-description">
    <meta property="og:image" content="" id="og-image">
    <meta property="og:url" content="" id="og-url">
    <meta name="twitter:card" content="summary_large_image">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 100%;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            
            --color-mod: #fbbf24;
            --color-shader: #a78bfa;
            --color-resourcepack: #60a5fa;
            --color-modpack: #f87171;
            --color-plugin: #34d399;
            --color-datapack: #f472b6;
        }

        /* Боковая панель - прижата максимально влево */
        .sidebar {
            width: 264px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.65rem 0.55rem;
            height: 100vh;
            position: sticky;
            top: 0;
            left: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-button) var(--bg-body);
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar::-webkit-scrollbar {
            width: 6.6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-body);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--bg-button);
            border-radius: 4.4px;
        }

        .sidebar-logo {
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2.2rem;
            padding-left: 0.55rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.65rem;
        }

        .sidebar-category-title {
            padding: 0.55rem 0.55rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.55px;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.275rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            padding: 0.55rem 0.825rem;
            border-radius: 0.55rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.99rem;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.43rem;
            height: 1.43rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1.1rem 0.55rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 1.1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.825rem;
            margin-bottom: 1.1rem;
            padding: 0.55rem;
            border-radius: 0.55rem;
            background-color: var(--bg-button);
        }

        .user-avatar {
            width: 39.6px;
            height: 39.6px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            color: var(--text-contrast);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.99rem;
        }

        .user-nick {
            color: var(--text-secondary);
            font-size: 0.825rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.55rem;
            width: 100%;
            padding: 0.66rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2.2rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.99rem;
        }

        .google-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .google-btn svg {
            width: 1.21rem;
            height: 1.21rem;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-wrapper {
            width: 100%;
            max-width: 580px; /* СИЛЬНО УМЕНЬШЕНО - теперь посты узкие */
            margin: 0 auto;
        }

        .feed-header {
            margin-bottom: 2rem;
        }

        .feed-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-contrast);
        }

        .feed-title span {
            color: var(--text-brand);
        }

        .filter-chips {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.4rem 1rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .filter-chip:hover, .filter-chip.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
            border-color: var(--text-brand);
        }

        /* Истории как в Instagram */
        .stories-container {
            margin-bottom: 2rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 0.5rem 0;
        }

        .stories-container::-webkit-scrollbar {
            display: none;
        }

        .stories-track {
            display: flex;
            gap: 1rem;
            width: fit-content;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            width: 80px;
            flex-shrink: 0;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--text-brand), #ff8c00);
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-body);
        }

        .story-name {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-align: center;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
        }

        .feed-post {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            cursor: pointer;
            width: 100%;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .post-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--bg-button);
            object-fit: cover;
            border: 2px solid var(--text-brand);
        }

        .post-info {
            flex: 1;
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-contrast);
            line-height: 1.3;
        }

        .post-title-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .post-type {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .post-type.mod { background-color: var(--color-mod); color: #000; }
        .post-type.shader { background-color: var(--color-shader); color: #000; }
        .post-type.resourcepack { background-color: var(--color-resourcepack); color: #000; }
        .post-type.modpack { background-color: var(--color-modpack); color: #000; }
        .post-type.plugin { background-color: var(--color-plugin); color: #000; }
        .post-type.datapack { background-color: var(--color-datapack); color: #000; }

        .post-author {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        /* Карусель */
        .carousel-container {
            position: relative;
            width: 100%;
            background-color: #000;
            border-bottom: 1px solid var(--border-subtle);
            user-select: none;
            touch-action: pan-y pinch-zoom;
        }

        .carousel-track {
            display: flex;
            scroll-snap-type: x mandatory;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
        }

        .carousel-track.dragging {
            cursor: grabbing;
            scroll-snap-type: none;
            scroll-behavior: auto;
        }

        .carousel-track::-webkit-scrollbar {
            display: none;
        }

        .carousel-slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        .carousel-slide img {
            width: 100%;
            display: block;
            max-height: 55vh;
            object-fit: contain;
            pointer-events: none;
            user-drag: none;
            -webkit-user-drag: none;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.2s;
            line-height: 1;
            padding-bottom: 6px;
        }

        .carousel-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .carousel-btn.prev {
            left: 12px;
        }

        .carousel-btn.next {
            right: 12px;
        }

        .carousel-btn.prev::before {
            content: "←";
            transform: translateY(2px);
            display: block;
        }

        .carousel-btn.next::before {
            content: "→";
            transform: translateY(2px);
            display: block;
        }

        .carousel-btn span {
            display: none;
        }

        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
            cursor: pointer;
        }

        .carousel-dot.active {
            background-color: var(--text-brand);
            width: 18px;
            border-radius: 10px;
        }

        .post-image-static {
            width: 100%;
            display: block;
            max-height: 55vh;
            object-fit: contain;
            background-color: #000;
            border-bottom: 1px solid var(--border-subtle);
            pointer-events: none;
        }

        .post-actions {
            display: flex;
            gap: 1.5rem;
            padding: 1rem 1.2rem 1rem 1.2rem;
            border-top: 1px solid var(--border-subtle);
            justify-content: space-between;
        }

        .actions-left {
            display: flex;
            gap: 1.5rem;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: var(--text-brand);
        }

        .action-btn svg {
            width: 1.6rem;
            height: 1.6rem;
            stroke: currentColor;
            fill: none;
            transition: fill 0.2s;
        }

        .action-btn.liked svg {
            fill: var(--text-brand);
            stroke: var(--text-brand);
        }

        .action-btn.saved svg {
            fill: var(--text-brand);
            stroke: var(--text-brand);
        }

        .likes-count {
            font-weight: 600;
            color: var(--text-contrast);
            font-size: 1rem;
        }

        .post-body {
            padding: 1rem 1.2rem 0.7rem 1.2rem;
        }

        .post-description {
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 0.7rem;
        }

        .post-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
        }

        .category-tag {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 9999px;
            padding: 0.2rem 0.7rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        /* Material You стиль загрузки */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .material-progress {
            width: 200px;
            height: 4px;
            background-color: var(--border-subtle);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .material-progress-bar {
            height: 100%;
            width: 30%;
            background-color: var(--text-brand);
            border-radius: 4px;
            position: absolute;
            animation: material-loading 1.5s infinite ease-in-out;
        }

        @keyframes material-loading {
            0% {
                left: -30%;
            }
            100% {
                left: 100%;
            }
        }

        .friendly-text {
            color: var(--text-brand);
            font-weight: 500;
            font-size: 1.1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 2rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            z-index: 1010;
        }

        /* Стили для модального окна поделиться */
        .share-modal-content {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border-subtle);
        }

        .share-modal-content h3 {
            color: var(--text-contrast);
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }

        .share-preview {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background-color: var(--bg-button);
            border-radius: 0.75rem;
        }

        .share-preview img {
            width: 48px;
            height: 48px;
            border-radius: 0.5rem;
            object-fit: cover;
        }

        .share-preview-info {
            flex: 1;
        }

        .share-preview-info h4 {
            color: var(--text-contrast);
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .share-preview-info p {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .share-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .share-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 0.75rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            width: 100%;
        }

        .share-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .share-btn i {
            color: var(--text-brand);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="modal" id="galleryModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <!-- Модальное окно для поделиться -->
    <div class="modal" id="shareModal">
        <div class="share-modal-content">
            <span class="modal-close" onclick="document.getElementById('shareModal').classList.remove('show')">&times;</span>
            <h3>Поделиться проектом</h3>
            
            <div class="share-preview" id="sharePreview">
                <!-- Заполняется динамически -->
            </div>
            
            <div class="share-buttons">
                <button class="share-btn" id="copyLinkBtn">
                    <i class="fas fa-copy"></i>
                    Копировать ссылку
                </button>
                <button class="share-btn" id="shareInChatBtn">
                    <i class="fas fa-comment"></i>
                    Отправить в чат
                </button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='/minecraft/'">Deynik <span>Minecraft</span></div>
            
            <!-- Категория 1: Главное -->
            <div class="sidebar-category">
                <div class="sidebar-category-title">Главное</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item active" onclick="window.location.href='/minecraft/'">
                        <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9z"/><path d="M9 21v-6h6v6"/></svg>
                        Рекомендации
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html'">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Поиск
                    </button>
                    <button class="sidebar-item" id="savedBtn">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Сохраненные
                    </button>
                    <button class="sidebar-item" id="messengerBtn">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Мессенджер
                    </button>
                </div>
            </div>

            <!-- Категория 2: Контент -->
            <div class="sidebar-category">
                <div class="sidebar-category-title">Контент</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=mod'">
                        <svg viewBox="0 0 24 24"><path d="M20 7h-4.5L15 4H9L8.5 7H4v2h16V7z"/><rect x="4" y="9" width="16" height="10" rx="1"/><circle cx="8" cy="13" r="1"/><circle cx="16" cy="13" r="1"/></svg>
                        Моды
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=shader'">
                        <svg viewBox="0 0 24 24"><path d="M12 3v1M5 8h1M18 8h1M8 21h8M12 8v8"/><circle cx="12" cy="15" r="3"/><path d="M8 11L5 8M16 11l3-3"/></svg>
                        Шейдеры
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=resourcepack'">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M9 9l6 6M15 9l-6 6"/></svg>
                        Ресурспаки
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=modpack'">

        // ========== ФУНКЦИИ ДЛЯ ГАЛЕРЕИ ==========

        window.scrollCarousel = function(container, direction) {
            const track = container.querySelector('.carousel-track');
            if (!track) return;
            const slideWidth = track.clientWidth;
            track.scrollBy({ left: direction * slideWidth, behavior: 'smooth' });
        };

        function setupCarousel(container) {
            const track = container.querySelector('.carousel-track');
            const dots = container.querySelectorAll('.carousel-dot');
            if (!track || dots.length === 0) return;

            let isDown = false;
            let startX;
            let scrollLeft;
            let isDragging = false;

            track.addEventListener('mousedown', (e) => {
                isDown = true;
                isDragging = false;
                track.classList.add('dragging');
                startX = e.pageX - track.offsetLeft;
                scrollLeft = track.scrollLeft;
                e.preventDefault();
            });

            track.addEventListener('mouseleave', () => {
                isDown = false;
                track.classList.remove('dragging');
            });

            track.addEventListener('mouseup', (e) => {
                isDown = false;
                track.classList.remove('dragging');
                
                if (!isDragging) {
                    const slide = e.target.closest('.carousel-slide');
                    if (slide) {
                        const img = slide.querySelector('img');
                        if (img) {
                            window.openModal(img.src);
                        }
                    }
                }
            });

            track.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                isDragging = true;
                const x = e.pageX - track.offsetLeft;
                const walk = (x - startX) * 1.5;
                track.scrollLeft = scrollLeft - walk;
            });

            track.querySelectorAll('img').forEach(img => {
                img.addEventListener('dragstart', (e) => e.preventDefault());
            });

            const updateDots = () => {
                const scrollLeft = track.scrollLeft;
                const slideWidth = track.clientWidth;
                const activeIndex = Math.round(scrollLeft / slideWidth);
                dots.forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === activeIndex);
                });
            };

            track.addEventListener('scroll', updateDots);
            track.addEventListener('scrollend', updateDots);
            updateDots();
        }

        // ========== ПЕРЕВОД ==========
        async function translateText(text) {
            if (!text || text.length < 20) return text;
            if (cachedTranslations.has(text)) return cachedTranslations.get(text);
            try {
                const response = await fetch(TRANSLATE_API + encodeURIComponent(text));
                const data = await response.json();
                const translated = data[0][0][0];
                cachedTranslations.set(text, translated);
                return translated;
            } catch (error) {
                console.warn('Ошибка перевода:', error);
                return text;
            }
        }

        // ========== ФОРМАТИРОВАНИЕ ==========
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
            if (num >= 1_000) return (num / 1_000).toFixed(1) + 'k';
            return num.toString();
        }

        function formatRelativeDate(dateString) {
            if (!dateString) return 'неизвестно';
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays < 7) return `${diffDays} ${['день', 'дня', 'дней'][getWordIndex(diffDays)]} назад`;
            if (diffDays < 30) return `${Math.floor(diffDays/7)} ${['неделю', 'недели', 'недель'][getWordIndex(Math.floor(diffDays/7))]} назад`;
            if (diffDays < 365) return `${Math.floor(diffDays/30)} ${['месяц', 'месяца', 'месяцев'][getWordIndex(Math.floor(diffDays/30))]} назад`;
            return `${Math.floor(diffDays/365)} ${['год', 'года', 'лет'][getWordIndex(Math.floor(diffDays/365))]} назад`;
        }

        function getWordIndex(n) { 
            return (n%10==1 && n%100!=11) ? 0 : (n%10>=2 && n%10<=4 && (n%100<10 || n%100>=20)) ? 1 : 2; 
        }

        function getGalleryImages(project) {

            } else {
                likes--;
                localStorage.removeItem(`like_${postId}`);
            }
            likesSpan.textContent = formatNumber(likes);
        };

        // ========== ЗАГРУЗКА ПОСТОВ ==========
        async function loadMorePosts(reset = false) {
            if (isLoading || !hasMore) return;
            isLoading = true;

            const oldLoading = document.getElementById('loading-more');
            if (oldLoading) oldLoading.remove();

            try {
                const promises = [];
                const typesToFetch = currentFilter === 'all' ? projectTypes : [currentFilter];
                
                for (let i = 0; i < 5; i++) {
                    const randomType = typesToFetch[Math.floor(Math.random() * typesToFetch.length)];
                    const randomOffset = Math.floor(Math.random() * 5000);
                    const url = `${API_BASE}/search?limit=1&offset=${randomOffset}&index=newest&facets=${encodeURIComponent(JSON.stringify([[`project_type:${randomType}`]]))}`;
                    
                    promises.push(
                        fetch(url).then(res => res.json()).then(async data => {
                            if (data.hits && data.hits.length > 0) {
                                const project = data.hits[0];
                                const projectRes = await fetch(`${API_BASE}/project/${project.slug}`);
                                const fullProject = await projectRes.json();
                                return { ...project, fullData: fullProject };
                            }
                            return null;
                        })
                    );
                }

                let results = await Promise.all(promises);
                let validPosts = results.filter(p => p !== null);
                validPosts = shuffleArray(validPosts);

                const translatePromises = validPosts.map(p => p.description && !cachedTranslations.has(p.description) ? translateText(p.description) : Promise.resolve());
                await Promise.all(translatePromises);

                if (validPosts.length === 0) {
                    hasMore = false;
                } else {
                    renderNewPosts(validPosts);
                    feedPosts.push(...validPosts);
                    currentPage++;
                }

            } catch (error) {
                console.error('Ошибка загрузки:', error);
            } finally {
                isLoading = false;
                
                const loadingElement = document.getElementById('initialLoading');
                if (loadingElement) loadingElement.remove();
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getDescription(project) {
            const cached = cachedTranslations.get(project.description);
            return cached || project.description || 'Нет описания';
        }

        function isLiked(postId) {
            return localStorage.getItem(`like_${postId}`) === 'true';
        }

        function isSaved(postId) {
            return savedProjects.has(postId);
        }

        function renderNewPosts(posts) {
            let html = '';

            for (const post of posts) {
                const description = getDescription(post);
                const iconUrl = post.icon_url || 'https://via.placeholder.com/48/2c2c30/a0a0a8?text=Mod';

                const typeName = projectTypeNames[post.project_type] || 'Проект';
                const postId = `${post.project_type}_${post.slug}`;
                const liked = isLiked(postId);
                const saved = isSaved(postId);

                let mediaHtml = '';
                if (galleryImages && galleryImages.length > 1) {
                    const slidesHtml = galleryImages.map(img => 
                        `<div class="carousel-slide"><img src="${img}" onclick="event.stopPropagation(); openModal('${img}')" loading="lazy"></div>`
                    ).join('');
                    const dotsHtml = galleryImages.map((_, idx) => 
                        `<span class="carousel-dot" onclick="event.stopPropagation(); document.querySelector('#carousel-${postId} .carousel-track').scrollTo({ left: ${idx} * document.querySelector('#carousel-${postId} .carousel-track').clientWidth, behavior: 'smooth' })"></span>`
                    ).join('');

                    mediaHtml = `
                        <div class="carousel-container" id="carousel-${postId}" onclick="event.stopPropagation()">
                            <div class="carousel-track">${slidesHtml}</div>
                            <div class="carousel-btn prev" onclick="event.stopPropagation(); scrollCarousel(this.closest('.carousel-container'), -1)"></div>
                            <div class="carousel-btn next" onclick="event.stopPropagation(); scrollCarousel(this.closest('.carousel-container'), 1)"></div>
                            <div class="carousel-dots">${dotsHtml}</div>
                        </div>
                    `;
                } else if (galleryImages && galleryImages.length === 1) {
                    mediaHtml = `<img src="${galleryImages[0]}" class="post-image-static" onclick="event.stopPropagation(); openModal('${galleryImages[0]}')" loading="lazy">`;
                }

                html += `
                    <div class="feed-post" onclick="window.location.href='/minecraft/${post.project_type}.html#${post.project_type}/${post.slug}'">
                        <div class="post-header">
                            <img src="${iconUrl}" class="post-icon" alt="${escapeHtml(post.title)}" onerror="this.src='https://via.placeholder.com/48/2c2c30/a0a0a8?text=Mod'">
                            <div class="post-info">
                                <div class="post-title-row">
                                    <span class="post-title">${escapeHtml(post.title)}</span>
                                    <span class="post-type ${post.project_type}">${typeName}</span>
                                </div>
                                <div class="post-author">${escapeHtml(post.author || 'Неизвестен')}</div>
                            </div>
                        </div>
                        
                        ${mediaHtml}

                        <div class="post-body">
                            <div class="post-description">${escapeHtml(description)}</div>
                            <div class="post-categories">
                                ${(post.categories || []).slice(0, 3).map(cat => `<span class="category-tag">${escapeHtml(cat)}</span>`).join('')}
                            </div>
                            <div class="post-date">${formatRelativeDate(post.date_created)}</div>
                        </div>

                        <div class="post-actions">
                            <div class="actions-left">
                                <button class="action-btn ${liked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(this, '${postId}')">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                    </svg>
                                    <span class="likes-count">${formatNumber(post.follows)}</span>
                                </button>
                                <button class="action-btn" onclick="event.stopPropagation(); window.location.href='/minecraft/${post.project_type}.html#${post.project_type}/${post.slug}'">
                                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    Подробнее
                                </button>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="action-btn" onclick="event.stopPropagation(); showShareModal(${JSON.stringify({
                                    title: post.title,
                                    author: post.author,
                                    project_type: post.project_type,
                                    slug: post.slug,
                                    icon_url: iconUrl
                                }).replace(/"/g, '&quot;')})">
                                    <svg viewBox="0 0 24 24" width="24" height="24">
                                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/>
                                    </svg>
                                </button>
                                <button class="action-btn ${saved ? 'saved' : ''}" onclick="event.stopPropagation(); toggleSave('${postId}', ${JSON.stringify({
                                    title: post.title,
                                    type: post.project_type,
                                    slug: post.slug,
                                    icon: iconUrl,
                                    author: post.author,
                                    description: description
                                })}, this)">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (currentPage === 0) {
                feedEl.innerHTML = html;
            } else {
                feedEl.insertAdjacentHTML('beforeend', html);
            }

            posts.forEach(post => {
                const postId = `${post.project_type}_${post.slug}`;
                const container = document.getElementById(`carousel-${postId}`);
                if (container) setupCarousel(container);
            });
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;'; 
                if (m === '<') return '&lt;'; 
                if (m === '>') return '&gt;'; 
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // ========== СКРОЛЛ ==========
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;
            if (scrollY + windowHeight > documentHeight - 400) {
                loadMorePosts();
            }
        });

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        window.addEventListener('click', (e) => {
            if (e.target === shareModal) {
                shareModal.classList.remove('show');
                currentSharePost = null;
            }
        });

        // Запуск
        loadTopProjects();
        loadMorePosts();
    </script>
</body>
</html>
