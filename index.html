<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Рекомендации</title>
    <!-- Open Graph метатеги -->
    <meta property="og:title" content="Deynik Minecraft" id="og-title">
    <meta property="og:description" content="Лучшие проекты для Minecraft" id="og-description">
    <meta property="og:image" content="" id="og-image">
    <meta property="og:url" content="" id="og-url">
    <meta name="twitter:card" content="summary_large_image">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 100%;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            
            --color-mod: #fbbf24;
            --color-shader: #a78bfa;
            --color-resourcepack: #60a5fa;
            --color-modpack: #f87171;
            --color-plugin: #34d399;
            --color-datapack: #f472b6;
            
            --color-fabric: #dbb69b;
            --color-forge: #959eef;
            --color-neoforge: #f99e6b;
            --color-quilt: #c796f9;
        }

        /* Боковая панель */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.8rem;
            height: 100vh;
            position: sticky;
            top: 0;
            left: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar-logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.5rem;
        }

        .sidebar-category-title {
            padding: 0.5rem 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 0.8rem;
            border-radius: 0.6rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.4rem;
            height: 1.4rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding: 0.6rem;
            border-radius: 0.6rem;
            background-color: var(--bg-button);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            color: var(--text-contrast);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.95rem;
        }

        .user-nick {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.7rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .google-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .google-btn svg {
            width: 1.2rem;
            height: 1.2rem;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 2rem;
        }

        .content-wrapper {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
        }

        .feed-header {
            margin-bottom: 2rem;
        }

        .feed-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-contrast);
        }

        .feed-title span {
            color: var(--text-brand);
        }

        .filter-section {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-start;
        }

        .filter-chips {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.4rem 1rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .filter-chip:hover, .filter-chip.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
            border-color: var(--text-brand);
        }

        .advanced-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 0.4rem 1rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            outline: none;
        }

        .filter-select:hover {
            border-color: var(--text-brand);
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
        }

        .feed-post {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .feed-post:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .post-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--bg-button);
            object-fit: cover;
            border: 2px solid var(--text-brand);
        }

        .post-info {
            flex: 1;
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-contrast);
            line-height: 1.3;
        }

        .post-title-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .post-type {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .post-type.mod { background-color: var(--color-mod); color: #000; }
        .post-type.shader { background-color: var(--color-shader); color: #000; }
        .post-type.resourcepack { background-color: var(--color-resourcepack); color: #000; }
        .post-type.modpack { background-color: var(--color-modpack); color: #000; }
        .post-type.plugin { background-color: var(--color-plugin); color: #000; }
        .post-type.datapack { background-color: var(--color-datapack); color: #000; }

        .post-author {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            background-color: #000;
            border-bottom: 1px solid var(--border-subtle);
            user-select: none;
        }

        .carousel-track {
            display: flex;
            scroll-snap-type: x mandatory;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            cursor: grab;
        }

        .carousel-track.dragging {
            cursor: grabbing;
            scroll-snap-type: none;
        }

        .carousel-track::-webkit-scrollbar {
            display: none;
        }

        .carousel-slide {
            flex: 0 0 100%;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        .carousel-slide img {
            width: 100%;
            display: block;
            max-height: 50vh;
            object-fit: contain;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: background-color 0.2s;
        }

        .carousel-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .carousel-btn.prev {
            left: 12px;
        }

        .carousel-btn.next {
            right: 12px;
        }

        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(2px);
        }

        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
            cursor: pointer;
        }

        .carousel-dot.active {
            background-color: var(--text-brand);
            width: 18px;
            border-radius: 10px;
        }

        .post-image-static {
            width: 100%;
            display: block;
            max-height: 50vh;
            object-fit: contain;
            background-color: #000;
            border-bottom: 1px solid var(--border-subtle);
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-top: 1px solid var(--border-subtle);
            justify-content: space-between;
        }

        .actions-left {
            display: flex;
            gap: 1rem;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: color 0.2s;
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
        }

        .action-btn:hover {
            color: var(--text-brand);
            background-color: var(--bg-button);
        }

        .action-btn svg {
            width: 1.4rem;
            height: 1.4rem;
            stroke: currentColor;
            fill: none;
        }

        .action-btn.liked svg {
            fill: var(--text-brand);
            stroke: var(--text-brand);
        }

        .action-btn.saved svg {
            fill: var(--text-brand);
            stroke: var(--text-brand);
        }

        .likes-count {
            font-weight: 600;
            color: var(--text-contrast);
        }

        .post-body {
            padding: 1rem;
        }

        .post-description {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 0.7rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
        }

        .category-tag {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 9999px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .post-date {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .loading-more {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 2rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
            z-index: 1010;
        }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .modal-nav-btn {
            pointer-events: auto;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin: 0 1rem;
        }

        .modal-nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .share-modal-content {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border-subtle);
        }

        .share-modal-content h3 {
            color: var(--text-contrast);
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }

        .share-preview {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background-color: var(--bg-button);
            border-radius: 0.75rem;
        }

        .share-preview img {
            width: 48px;
            height: 48px;
            border-radius: 0.5rem;
            object-fit: cover;
        }

        .share-preview-info {
            flex: 1;
        }

        .share-preview-info h4 {
            color: var(--text-contrast);
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .share-preview-info p {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .share-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .share-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 0.75rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            width: 100%;
        }

        .share-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .share-btn i {
            color: var(--text-brand);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="modal" id="galleryModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
        <div class="modal-nav">
            <button class="modal-nav-btn" onclick="prevImage()">‹</button>
            <button class="modal-nav-btn" onclick="nextImage()">›</button>
        </div>
    </div>

    <div class="modal" id="shareModal">
        <div class="share-modal-content">
            <span class="modal-close" onclick="document.getElementById('shareModal').classList.remove('show')">&times;</span>
            <h3>Поделиться проектом</h3>
            <div class="share-preview" id="sharePreview"></div>
            <div class="share-buttons">
                <button class="share-btn" id="copyLinkBtn">
                    <i class="fas fa-copy"></i>
                    Копировать ссылку
                </button>
                <button class="share-btn" id="shareInChatBtn">
                    <i class="fas fa-comment"></i>
                    Отправить в чат
                </button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="content-wrapper">
                <div class="feed-header">
                    <h1 class="feed-title">Рекомендации <span>для вас</span></h1>
                    <div class="filter-section">
                        <div class="filter-chips">
                            <span class="filter-chip active" data-filter="all">Всё</span>
                            <span class="filter-chip" data-filter="mod">Моды</span>
                            <span class="filter-chip" data-filter="shader">Шейдеры</span>
                            <span class="filter-chip" data-filter="resourcepack">Ресурспаки</span>
                            <span class="filter-chip" data-filter="modpack">Сборки</span>
                            <span class="filter-chip" data-filter="plugin">Плагины</span>
                            <span class="filter-chip" data-filter="datapack">Датапаки</span>
                        </div>
                        <div class="advanced-filters">
                            <select class="filter-select" id="gameVersionFilter">
                                <option value="">Все версии</option>
                                <option value="1.21">1.21+</option>
                                <option value="1.20">1.20+</option>
                                <option value="1.19">1.19+</option>
                                <option value="1.18">1.18+</option>
                            </select>
                            <select class="filter-select" id="loaderFilter">
                                <option value="">Все загрузчики</option>
                                <option value="fabric">Fabric</option>
                                <option value="forge">Forge</option>
                                <option value="neoforge">NeoForge</option>
                                <option value="quilt">Quilt</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="feed" id="feed">
                    <div class="loading-more" id="initialLoading">
                        <div class="friendly-text">Собираем для вас подборку ✨</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="/minecraft/common.js"></script>
    <script>
        const API_BASE = 'https://api.modrinth.com/v2';
        const projectTypes = ['mod', 'shader', 'resourcepack', 'modpack', 'plugin', 'datapack'];
        const projectTypeNames = {
            'mod': 'Мод', 'shader': 'Шейдер', 'resourcepack': 'Ресурспак',
            'modpack': 'Сборка', 'plugin': 'Плагин', 'datapack': 'Датапак'
        };

        let feedPosts = [];
        let isLoading = false;
        let hasMore = true;
        let currentPage = 0;
        let currentFilter = 'all';
        let currentGameVersion = '';
        let currentLoader = '';
        let currentGalleryImages = [];
        let currentGalleryIndex = 0;
        let currentSharePost = null;

        const feedEl = document.getElementById('feed');
        const filterChips = document.querySelectorAll('.filter-chip');
        const gameVersionFilter = document.getElementById('gameVersionFilter');
        const loaderFilter = document.getElementById('loaderFilter');

        // Загрузка боковой панели
        window.loadSidebar();

        // Галерея
        window.openModal = function(src, images, index) {
            if (images) {
                currentGalleryImages = images;
                currentGalleryIndex = index;
            }
            document.getElementById('modalImage').src = src;
            document.getElementById('galleryModal').classList.add('show');
        };

        window.closeModal = function() {
            document.getElementById('galleryModal').classList.remove('show');
            currentGalleryImages = [];
        };

        window.prevImage = function() {
            if (currentGalleryImages.length > 0) {
                currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
                document.getElementById('modalImage').src = currentGalleryImages[currentGalleryIndex];
            }
        };

        window.nextImage = function() {
            if (currentGalleryImages.length > 0) {
                currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryImages.length;
                document.getElementById('modalImage').src = currentGalleryImages[currentGalleryIndex];
            }
        };

        window.scrollCarousel = function(container, direction) {
            const track = container.querySelector('.carousel-track');
            if (!track) return;
            const slideWidth = track.clientWidth;
            track.scrollBy({ left: direction * slideWidth, behavior: 'smooth' });
        };

        function setupCarousel(container) {
            const track = container.querySelector('.carousel-track');
            const dots = container.querySelectorAll('.carousel-dot');
            if (!track || dots.length === 0) return;

            let isDown = false;
            let startX;
            let scrollLeft;
            let isDragging = false;

            track.addEventListener('mousedown', (e) => {
                isDown = true;
                isDragging = false;
                track.classList.add('dragging');
                startX = e.pageX - track.offsetLeft;
                scrollLeft = track.scrollLeft;
                e.preventDefault();
            });

            track.addEventListener('mouseleave', () => {
                isDown = false;
                track.classList.remove('dragging');
            });

            track.addEventListener('mouseup', (e) => {
                isDown = false;
                track.classList.remove('dragging');
                if (!isDragging) {
                    const slide = e.target.closest('.carousel-slide');
                    if (slide) {
                        const img = slide.querySelector('img');
                        const allImages = Array.from(track.querySelectorAll('.carousel-slide img')).map(i => i.src);
                        const index = Array.from(track.querySelectorAll('.carousel-slide')).findIndex(s => s === slide);
                        if (img) {
                            openModal(img.src, allImages, index);
                        }
                    }
                }
            });

            track.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                isDragging = true;
                const x = e.pageX - track.offsetLeft;
                const walk = (x - startX) * 1.5;
                track.scrollLeft = scrollLeft - walk;
            });

            track.querySelectorAll('img').forEach(img => {
                img.addEventListener('dragstart', (e) => e.preventDefault());
            });

            const updateDots = () => {
                const scrollLeft = track.scrollLeft;
                const slideWidth = track.clientWidth;
                const activeIndex = Math.round(scrollLeft / slideWidth);
                dots.forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === activeIndex);
                });
            };

            track.addEventListener('scroll', updateDots);
            track.addEventListener('scrollend', updateDots);
            updateDots();
        }

        function getGalleryImages(project) {
            return (project.gallery && project.gallery.length > 0) ? project.gallery.map(g => g.url) : null;
        }

        function formatRelativeDate(dateString) {
            if (!dateString) return 'неизвестно';
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays < 7) return `${diffDays} дн. назад`;
            if (diffDays < 30) return `${Math.floor(diffDays/7)} нед. назад`;
            if (diffDays < 365) return `${Math.floor(diffDays/30)} мес. назад`;
            return `${Math.floor(diffDays/365)} г. назад`;
        }

        async function loadMorePosts(reset = false) {
            if (isLoading || !hasMore) return;
            isLoading = true;

            if (reset) {
                feedPosts = [];
                currentPage = 0;
                hasMore = true;
                window.showSkeleton(feedEl, 3);
            }

            try {
                const typesToFetch = currentFilter === 'all' ? projectTypes : [currentFilter];
                const facets = [];
                
                facets.push([`project_type:${typesToFetch.join(',')}`]);
                
                if (currentGameVersion) {
                    facets.push([`versions:${currentGameVersion}`]);
                }
                
                const randomOffset = Math.floor(Math.random() * 3000);
                const url = `${API_BASE}/search?limit=8&offset=${randomOffset}&index=newest&facets=${encodeURIComponent(JSON.stringify(facets))}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                let projects = data.hits || [];
                
                if (currentLoader) {
                    const loaderPromises = projects.map(async (project) => {
                        const versionRes = await fetch(`${API_BASE}/project/${project.slug}/version?limit=5`);
                        const versions = await versionRes.json();
                        const hasLoader = versions.some(v => v.loaders.includes(currentLoader));
                        return { project, hasLoader };
                    });
                    
                    const loaderResults = await Promise.all(loaderPromises);
                    projects = loaderResults.filter(r => r.hasLoader).map(r => r.project);
                }
                
                for (const project of projects) {
                    if (project.description && !window.cachedTranslations.has(project.description)) {
                        await window.translateText(project.description);
                    }
                }
                
                window.hideSkeleton(feedEl);
                
                if (projects.length === 0 && reset) {
                    feedEl.innerHTML = '<div class="loading-more"><div class="friendly-text">Ничего не найдено 😢</div></div>';
                    hasMore = false;
                } else if (projects.length > 0) {
                    renderNewPosts(projects);
                    feedPosts.push(...projects);
                    currentPage++;
                }
                
                if (projects.length < 8) {
                    hasMore = false;
                }

            } catch (error) {
                console.error('Ошибка загрузки:', error);
                window.hideSkeleton(feedEl);
                if (reset) {
                    feedEl.innerHTML = '<div class="loading-more"><div class="friendly-text">❌ Ошибка загрузки. Попробуйте позже</div></div>';
                }
            } finally {
                isLoading = false;
            }
        }

        function getDescription(project) {
            const cached = window.cachedTranslations.get(project.description);
            return cached || project.description || 'Нет описания';
        }

        function isLiked(postId) {
            return localStorage.getItem(`like_${postId}`) === 'true';
        }

        window.toggleLike = function(button, postId) {
            button.classList.toggle('liked');
            const likesSpan = button.querySelector('.likes-count');
            let likes = parseInt(likesSpan.textContent.replace(/[^0-9]/g, ''));
            if (button.classList.contains('liked')) {
                likes++;
                localStorage.setItem(`like_${postId}`, 'true');
            } else {
                likes--;
                localStorage.removeItem(`like_${postId}`);
            }
            likesSpan.textContent = window.formatNumber(likes);
        };

        window.handleSave = async function(postId, projectData, button) {
            if (!window.currentUser) {
                window.showToast('Войдите, чтобы сохранять проекты', 'error');
                return;
            }
            
            if (button.classList.contains('saved')) {
                const success = await window.unsaveProject(postId);
                if (success) {
                    button.classList.remove('saved');
                }
            } else {
                const success = await window.saveProject(postId, projectData);
                if (success) {
                    button.classList.add('saved');
                }
            }
        };

        function renderNewPosts(posts) {
            let html = '';

            for (const post of posts) {
                const description = getDescription(post);
                const iconUrl = post.icon_url || 'https://via.placeholder.com/48/2c2c30/a0a0a8?text=Mod';
                const galleryImages = post.gallery || null;
                const typeName = projectTypeNames[post.project_type] || 'Проект';
                const postId = `${post.project_type}_${post.slug}`;
                const liked = isLiked(postId);
                const saved = window.isSaved(postId);

                let mediaHtml = '';
                if (galleryImages && galleryImages.length > 1) {
                    const slidesHtml = galleryImages.map((img, idx) => 
                        `<div class="carousel-slide"><img src="${img.url}" data-index="${idx}" loading="lazy"></div>`
                    ).join('');
                    const dotsHtml = galleryImages.map((_, idx) => 
                        `<span class="carousel-dot" data-index="${idx}"></span>`
                    ).join('');

                    mediaHtml = `
                        <div class="carousel-container" id="carousel-${postId}" onclick="event.stopPropagation()">
                            <div class="carousel-track">${slidesHtml}</div>
                            <div class="carousel-btn prev" onclick="event.stopPropagation(); scrollCarousel(this.closest('.carousel-container'), -1)">‹</div>
                            <div class="carousel-btn next" onclick="event.stopPropagation(); scrollCarousel(this.closest('.carousel-container'), 1)">›</div>
                            <div class="carousel-dots">${dotsHtml}</div>
                        </div>
                    `;
                } else if (galleryImages && galleryImages.length === 1) {
                    mediaHtml = `<img src="${galleryImages[0].url}" class="post-image-static" loading="lazy">`;
                }

                const projectData = {
                    title: post.title,
                    type: post.project_type,
                    slug: post.slug,
                    icon: iconUrl,
                    author: post.author,
                    description: description
                };

                html += `
                    <div class="feed-post" onclick="window.location.href='/minecraft/project.html#${post.project_type}/${post.slug}'">
                        <div class="post-header">
                            <img src="${iconUrl}" class="post-icon" alt="${window.escapeHtml(post.title)}" onerror="this.src='https://via.placeholder.com/48/2c2c30/a0a0a8?text=Mod'">
                            <div class="post-info">
                                <div class="post-title-row">
                                    <span class="post-title">${window.escapeHtml(post.title)}</span>
                                    <span class="post-type ${post.project_type}">${typeName}</span>
                                </div>
                                <div class="post-author">${window.escapeHtml(post.author || 'Неизвестен')}</div>
                            </div>
                        </div>
                        
                        ${mediaHtml}

                        <div class="post-body">
                            <div class="post-description">${window.escapeHtml(description)}</div>
                            <div class="post-categories">
                                ${(post.categories || []).slice(0, 3).map(cat => `<span class="category-tag">${window.escapeHtml(cat)}</span>`).join('')}
                            </div>
                            <div class="post-date">${formatRelativeDate(post.date_created)}</div>
                        </div>

                        <div class="post-actions">
                            <div class="actions-left">
                                <button class="action-btn ${liked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(this, '${postId}')">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                    </svg>
                                    <span class="likes-count">${window.formatNumber(post.follows)}</span>
                                </button>
                                <button class="action-btn" onclick="event.stopPropagation(); window.location.href='/minecraft/project.html#${post.project_type}/${post.slug}'">
                                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    Подробнее
                                </button>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="action-btn" onclick="event.stopPropagation(); showShareModal(${JSON.stringify(projectData).replace(/"/g, '&quot;')})">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/>
                                    </svg>
                                </button>
                                <button class="action-btn ${saved ? 'saved' : ''}" onclick="event.stopPropagation(); handleSave('${postId}', ${JSON.stringify(projectData).replace(/"/g, '&quot;')}, this)">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (currentPage === 0) {
                feedEl.innerHTML = html;
            } else {
                feedEl.insertAdjacentHTML('beforeend', html);
            }

            posts.forEach(post => {
                const postId = `${post.project_type}_${post.slug}`;
                const container = document.getElementById(`carousel-${postId}`);
                if (container) setupCarousel(container);
            });
        }

        function showShareModal(projectData) {
            currentSharePost = projectData;
            
            const sharePreview = document.getElementById('sharePreview');
            sharePreview.innerHTML = `
                <img src="${projectData.icon || 'https://via.placeholder.com/48/2c2c30/a0a0a8?text=Mod'}" alt="">
                <div class="share-preview-info">
                    <h4>${window.escapeHtml(projectData.title)}</h4>
                    <p>${window.escapeHtml(projectData.author || 'Неизвестен')} • ${projectTypeNames[projectData.type]}</p>
                </div>
            `;
            
            document.getElementById('shareModal').classList.add('show');
        }

        document.getElementById('copyLinkBtn').addEventListener('click', () => {
            if (currentSharePost) {
                const url = `${window.location.origin}/minecraft/project.html#${currentSharePost.type}/${currentSharePost.slug}`;
                navigator.clipboard.writeText(url);
                window.showToast('Ссылка скопирована!', 'success');
                document.getElementById('shareModal').classList.remove('show');
            }
        });

        document.getElementById('shareInChatBtn').addEventListener('click', () => {
            if (!window.currentUser) {
                window.showToast('Войдите, чтобы поделиться в чате', 'error');
                return;
            }
            if (currentSharePost) {
                localStorage.setItem('pendingShare', JSON.stringify(currentSharePost));
                window.location.href = '/minecraft/messenger.html';
            }
        });

        filterChips.forEach(chip => {
            chip.addEventListener('click', () => {
                filterChips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.dataset.filter;
                currentPage = 0;
                hasMore = true;
                loadMorePosts(true);
            });
        });

        gameVersionFilter.addEventListener('change', () => {
            currentGameVersion = gameVersionFilter.value;
            currentPage = 0;
            hasMore = true;
            loadMorePosts(true);
        });

        loaderFilter.addEventListener('change', () => {
            currentLoader = loaderFilter.value;
            currentPage = 0;
            hasMore = true;
            loadMorePosts(true);
        });

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;
            if (scrollY + windowHeight > documentHeight - 400 && !isLoading && hasMore) {
                loadMorePosts();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'ArrowLeft' && document.getElementById('galleryModal').classList.contains('show')) prevImage();
            if (e.key === 'ArrowRight' && document.getElementById('galleryModal').classList.contains('show')) nextImage();
        });

        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('shareModal')) {
                document.getElementById('shareModal').classList.remove('show');
            }
        });

        loadMorePosts(true);
    </script>
</body>
</html>
