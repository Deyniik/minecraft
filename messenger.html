<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Мессенджер</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1600px;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --text-contrast: #ffffff;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --border-subtle: #2c2c32;
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.5rem;
            height: 100vh;
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .sidebar-item:hover {
            background-color: #2c2c30;
            color: white;
        }

        .sidebar-item.active {
            background-color: rgba(251, 191, 36, 0.15);
            color: var(--text-brand);
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            background-color: #2c2c30;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem;
            background-color: #2c2c30;
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            padding: 1rem;
        }

        .messenger-container {
            background-color: #1c1c1f;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            height: calc(100vh - 2rem);
            display: flex;
            overflow: hidden;
        }

        .chats-panel {
            width: 300px;
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body);
        }

        .chats-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .user-nick-display {
            color: var(--text-brand);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #2c2c30;
            border-radius: 0.5rem;
            text-align: center;
        }

        .chats-search input {
            width: 100%;
            padding: 0.5rem;
            background-color: #2c2c30;
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: white;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            margin-bottom: 0.25rem;
        }

        .chat-item:hover {
            background-color: #2c2c30;
        }

        .chat-item.active {
            background-color: rgba(251, 191, 36, 0.15);
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chat-header i {
            color: var(--text-brand);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message {
            padding: 0.5rem 0.75rem;
            background: rgba(40, 40, 40, 0.6);
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 80%;
            align-self: flex-start;
        }

        .message.own {
            align-self: flex-end;
            background: rgba(251, 191, 36, 0.15);
            border-left: 2px solid var(--text-brand);
        }

        .message-user {
            font-weight: bold;
            color: var(--text-brand);
            margin-right: 5px;
        }

        .message-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--border-subtle);
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem;
            background-color: #2c2c30;
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: white;
        }

        .chat-send-btn {
            background: rgba(251, 191, 36, 0.3);
            border: 1px solid var(--text-brand);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            min-width: 100px;
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo">Deynik <span>Minecraft</span></div>
            
            <div class="sidebar-item active">Мессенджер</div>
            <div class="sidebar-item">Рекомендации</div>
            <div class="sidebar-item">Поиск</div>
            <div class="sidebar-item">Сохраненные</div>

            <div class="user-section" id="userSection">
                <div id="userInfo" style="display: none;">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div>
                        <div>
                            <div id="userName"></div>
                            <div style="color: var(--text-secondary); font-size: 0.8rem;" id="userNick"></div>
                        </div>
                    </div>
                </div>
                <button class="google-btn" id="googleSignInBtn">Войти через Google</button>
            </div>
        </div>

        <div class="main-content">
            <div class="messenger-container">
                <div class="chats-panel">
                    <div class="chats-header">
                        <div class="user-nick-display" id="currentUserNick">Загрузка...</div>
                        <div class="chats-search">
                            <input type="text" placeholder="Поиск...">
                        </div>
                    </div>
                    <div class="chats-list" id="chatsList">
                        <div class="loading">Загрузка чатов...</div>
                    </div>
                </div>

                <div class="chat-area">
                    <div class="chat-header">
                        <i class="fas fa-hashtag"></i>
                        <span>Основной чат</span>
                    </div>
                    
                    <div class="messages-container" id="messagesContainer">
                        <div class="loading">Загрузка сообщений...</div>
                    </div>
                    
                    <div class="message-input-area">
                        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
                        <button class="chat-send-btn" id="sendBtn" disabled>Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBk4nxZ1ldNQUCxsbgaeYTkm9stq0o9o2Q",
            authDomain: "deygram-e4814.firebaseapp.com",
            projectId: "deygram-e4814",
            storageBucket: "deygram-e4814.firebasestorage.app",
            messagingSenderId: "591207353726",
            appId: "1:591207353726:web:d20f5e648d3daf86fcb72f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let userNickname = localStorage.getItem('userNickname') || '';

        // Элементы
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const userName = document.getElementById('userName');
        const userNick = document.getElementById('userNick');
        const userAvatar = document.getElementById('userAvatar');
        const userInfo = document.getElementById('userInfo');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const currentUserNick = document.getElementById('currentUserNick');
        const chatsList = document.getElementById('chatsList');

        // ========== АВТОРИЗАЦИЯ ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                userInfo.style.display = 'block';
                googleSignInBtn.style.display = 'none';
                
                const displayName = userNickname || user.displayName || 'Пользователь';
                const nick = userNickname || `@${user.email.split('@')[0]}`;
                
                userName.textContent = displayName;
                userNick.textContent = nick;
                userAvatar.textContent = displayName.charAt(0).toUpperCase();
                currentUserNick.textContent = nick;
                
                // Сохраняем в users
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    displayName: displayName,
                    nick: nick,
                    email: user.email
                }, { merge: true });
                
                // Загружаем сообщения БЕЗ orderBy (чтобы избежать ошибки с timestamp)
                loadMessagesSimple();
                loadChats();
                
            } else {
                currentUser = null;
                userInfo.style.display = 'none';
                googleSignInBtn.style.display = 'flex';
                messagesContainer.innerHTML = '<div class="loading">🔒 Войдите в систему</div>';
                currentUserNick.textContent = 'Не авторизован';
            }
        });

        googleSignInBtn.addEventListener('click', () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        });

        // ========== ЗАГРУЗКА ЧАТОВ ==========
        function loadChats() {
            chatsList.innerHTML = `
                <div class="chat-item active">
                    <div class="chat-avatar"><i class="fas fa-hashtag"></i></div>
                    <div class="chat-info">
                        <div style="color: white;">Основной чат</div>
                    </div>
                </div>
            `;
        }

        // ========== ПРОСТАЯ ЗАГРУЗКА СООБЩЕНИЙ ==========
        function loadMessagesSimple() {
            messagesContainer.innerHTML = '<div class="loading">Загрузка сообщений...</div>';
            
            // Сначала проверим, есть ли вообще сообщения
            db.collection('chat').get().then((snapshot) => {
                if (snapshot.empty) {
                    messagesContainer.innerHTML = '<div class="loading">Нет сообщений. Напишите первое!</div>';
                    return;
                }
                
                // Если есть сообщения, покажем их
                let messages = [];
                snapshot.forEach(doc => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                
                // Попробуем отсортировать, но если нет timestamp - покажем как есть
                try {
                    messages.sort((a, b) => {
                        if (a.timestamp && b.timestamp) {
                            return a.timestamp - b.timestamp;
                        }
                        return 0;
                    });
                } catch (e) {
                    console.log('Сортировка не удалась, показываем как есть');
                }
                
                let html = '';
                messages.forEach(msg => {
                    const isOwn = msg.userId === currentUser?.uid;
                    let time = '';
                    
                    if (msg.timestamp && msg.timestamp.toDate) {
                        time = msg.timestamp.toDate().toLocaleTimeString();
                    }
                    
                    html += `
                        <div class="message ${isOwn ? 'own' : ''}">
                            <span class="message-user">${msg.userName || 'Пользователь'}</span>
                            <span style="float: right; color: #888; font-size: 0.7rem;">${time}</span>
                            <div>${msg.text || ''}</div>
                        </div>
                    `;
                });
                
                messagesContainer.innerHTML = html;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }).catch((error) => {
                console.error('Ошибка:', error);
                messagesContainer.innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            });
        }

        // ========== ОТПРАВКА СООБЩЕНИЙ ==========
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = !messageInput.value.trim();
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !sendBtn.disabled) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            const displayName = userNickname || currentUser.displayName || 'Пользователь';

            try {
                await db.collection('chat').add({
                    text: text,
                    userId: currentUser.uid,
                    userName: displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                messageInput.value = '';
                sendBtn.disabled = true;
                
                // Перезагружаем сообщения
                loadMessagesSimple();
                
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка: ' + error.message);
            }
        }
    </script>
</body>
</html>
