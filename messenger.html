<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Мессенджер</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1600px;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.5rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.5rem;
        }

        .sidebar-category-title {
            padding: 0.5rem 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            background-color: var(--bg-button);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            color: var(--text-contrast);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .user-nick {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .google-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 1rem;
        }

        .messenger-container {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            height: calc(100vh - 2rem);
            display: flex;
            overflow: hidden;
        }

        .chats-panel {
            width: 300px;
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body);
        }

        .chats-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .user-nick-display {
            color: var(--text-brand);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: var(--bg-button);
            border-radius: 0.5rem;
            text-align: center;
        }

        .chats-search {
            position: relative;
        }

        .chats-search input {
            width: 100%;
            padding: 0.5rem 0.5rem 0.5rem 2rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            font-size: 0.85rem;
        }

        .chats-search input:focus {
            border-color: var(--text-brand);
            outline: none;
        }

        .chats-search i {
            position: absolute;
            left: 0.7rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.25rem;
        }

        .chat-item:hover {
            background-color: var(--bg-button);
        }

        .chat-item.active {
            background-color: var(--bg-brand);
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            color: var(--text-contrast);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .chat-last-message {
            color: var(--text-secondary);
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--bg-raised);
        }

        .chat-header i {
            color: var(--text-brand);
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-title {
            color: var(--text-contrast);
            font-weight: 600;
            font-size: 1rem;
        }

        .chat-header-meta {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message {
            padding: 0.5rem 0.75rem;
            background: rgba(40, 40, 40, 0.6);
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 80%;
            align-self: flex-start;
        }

        .message.own {
            align-self: flex-end;
            background: rgba(251, 191, 36, 0.15);
            border-left: 2px solid var(--text-brand);
        }

        .message-user {
            font-weight: bold;
            color: var(--text-brand);
            margin-right: 5px;
            cursor: pointer;
        }

        .message-time {
            font-size: 0.7rem;
            color: #888;
            margin-left: 5px;
            float: right;
        }

        .message-text {
            word-break: break-word;
        }

        .message-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--border-subtle);
            background-color: var(--bg-raised);
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            font-size: 0.9rem;
        }

        .chat-input:focus {
            border-color: var(--text-brand);
            outline: none;
        }

        .chat-send-btn {
            background: rgba(251, 191, 36, 0.3);
            border: 1px solid var(--text-brand);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            min-width: 100px;
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .no-messages {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='/minecraft/'">Deynik <span>Minecraft</span></div>
            
            <div class="sidebar-category">
                <div class="sidebar-category-title">Главное</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/'">
                        <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9z"/><path d="M9 21v-6h6v6"/></svg>
                        Рекомендации
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html'">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Поиск
                    </button>
                    <button class="sidebar-item" id="savedBtn">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Сохраненные
                    </button>
                    <button class="sidebar-item active" id="messengerBtn">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Мессенджер
                    </button>
                </div>
            </div>

            <div class="sidebar-category">
                <div class="sidebar-category-title">Контент</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=mod'">Моды</button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=shader'">Шейдеры</button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=resourcepack'">Ресурспаки</button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=modpack'">Сборки</button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=plugin'">Плагины</button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=datapack'">Датапаки</button>
                </div>
            </div>

            <div class="user-section" id="userSection">
                <div id="userInfo" style="display: none;">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div>
                        <div class="user-details">
                            <div class="user-name" id="userName"></div>
                            <div class="user-nick" id="userNick"></div>
                        </div>
                    </div>
                </div>
                <button class="google-btn" id="googleSignInBtn">Войти через Google</button>
            </div>
        </div>

        <div class="main-content">
            <div class="messenger-container">
                <div class="chats-panel">
                    <div class="chats-header">
                        <div class="user-nick-display" id="currentUserNick">Загрузка...</div>
                        <div class="chats-search">
                            <i class="fas fa-search"></i>
                            <input type="text" id="userSearch" placeholder="Поиск по @никам...">
                        </div>
                    </div>
                    <div class="chats-list" id="chatsList">
                        <div class="loading">Загрузка чатов...</div>
                    </div>
                </div>

                <div class="chat-area">
                    <div class="chat-header">
                        <i class="fas fa-hashtag"></i>
                        <div class="chat-header-info">
                            <div class="chat-header-title" id="currentChatTitle">Основной чат</div>
                            <div class="chat-header-meta" id="currentChatMeta">0 онлайн</div>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messagesContainer">
                        <div class="loading">Загрузка сообщений...</div>
                    </div>
                    
                    <div class="message-input-area">
                        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
                        <button class="chat-send-btn" id="sendBtn" disabled>Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBk4nxZ1ldNQUCxsbgaeYTkm9stq0o9o2Q",
            authDomain: "deygram-e4814.firebaseapp.com",
            projectId: "deygram-e4814",
            storageBucket: "deygram-e4814.firebasestorage.app",
            messagingSenderId: "591207353726",
            appId: "1:591207353726:web:d20f5e648d3daf86fcb72f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let unsubscribeMessages = null;
        let userNickname = localStorage.getItem('userNickname') || '';

        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const userName = document.getElementById('userName');
        const userNick = document.getElementById('userNick');
        const userAvatar = document.getElementById('userAvatar');
        const userInfo = document.getElementById('userInfo');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const currentUserNick = document.getElementById('currentUserNick');
        const currentChatMeta = document.getElementById('currentChatMeta');
        const chatsList = document.getElementById('chatsList');
        const userSearch = document.getElementById('userSearch');

        // ========== АВТОРИЗАЦИЯ ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                userInfo.style.display = 'block';
                googleSignInBtn.style.display = 'none';
                
                const displayName = userNickname || user.displayName || 'Пользователь';
                const nick = userNickname || `@${user.email.split('@')[0]}`;
                
                userName.textContent = displayName;
                userNick.textContent = nick;
                userAvatar.textContent = displayName.charAt(0).toUpperCase();
                currentUserNick.textContent = nick;
                
                // Сохраняем в users (коллекция существует)
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    displayName: displayName,
                    nick: nick,
                    email: user.email,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                
                loadMessages();
                loadOnlineUsers();
                loadUsers();
                
                // Приветственное сообщение если чат пуст
                const snapshot = await db.collection('chat').limit(1).get();
                if (snapshot.empty) {
                    db.collection('chat').add({
                        text: 'Добро пожаловать в общий чат! 🎮',
                        userId: 'system',
                        userName: 'Система',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            } else {
                currentUser = null;
                userInfo.style.display = 'none';
                googleSignInBtn.style.display = 'flex';
                messagesContainer.innerHTML = '<div class="no-messages">🔒 Войдите, чтобы видеть сообщения</div>';
                currentUserNick.textContent = 'Не авторизован';
                
                if (unsubscribeMessages) unsubscribeMessages();
            }
        });

        googleSignInBtn.addEventListener('click', () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        });

        savedBtn.addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы увидеть сохраненные проекты');
                return;
            }
            window.location.href = '/minecraft/saved.html';
        });

        // ========== ОНЛАЙН ПОЛЬЗОВАТЕЛИ ==========
        function loadOnlineUsers() {
            db.collection('onlineUsers').onSnapshot((snapshot) => {
                const online = [];
                snapshot.forEach(doc => {
                    if (doc.data().online) online.push(doc.id);
                });
                currentChatMeta.textContent = `${online.size} онлайн`;
            });
            
            if (currentUser) {
                db.collection('onlineUsers').doc(currentUser.uid).set({
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                window.addEventListener('beforeunload', () => {
                    db.collection('onlineUsers').doc(currentUser.uid).update({
                        online: false
                    });
                });
            }
        }

        // ========== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ==========
        function loadUsers() {
            db.collection('users').onSnapshot((snapshot) => {
                const users = [];
                snapshot.forEach(doc => users.push(doc.data()));
                
                // Показываем Основной чат + всех пользователей
                let html = `
                    <div class="chat-item active" data-chat="general">
                        <div class="chat-avatar"><i class="fas fa-hashtag"></i></div>
                        <div class="chat-info">
                            <div class="chat-name">Основной чат</div>
                            <div class="chat-last-message">Общий чат</div>
                        </div>
                    </div>
                `;
                
                users.forEach(u => {
                    if (u.uid !== currentUser?.uid) {
                        html += `
                            <div class="chat-item" data-user="${u.uid}" data-nick="${u.nick}">
                                <div class="chat-avatar">${u.displayName.charAt(0)}</div>
                                <div class="chat-info">
                                    <div class="chat-name">${u.displayName}</div>
                                    <div class="chat-last-message">${u.nick}</div>
                                </div>
                            </div>
                        `;
                    }
                });
                
                chatsList.innerHTML = html;
                
                document.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => {
                        document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                    });
                });
            });
        }

        // ========== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ==========
        userSearch.addEventListener('input', () => {
            const query = userSearch.value.toLowerCase();
            document.querySelectorAll('.chat-item').forEach(item => {
                const nick = item.dataset.nick;
                if (nick && nick.toLowerCase().includes(query)) {
                    item.style.display = 'flex';
                } else if (!item.dataset.nick) {
                    item.style.display = 'flex'; // Основной чат всегда виден
                } else {
                    item.style.display = 'none';
                }
            });
        });

        // ========== ЗАГРУЗКА СООБЩЕНИЙ ==========
        function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();

            messagesContainer.innerHTML = '<div class="loading">Загрузка сообщений...</div>';

            unsubscribeMessages = db.collection('chat')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const messages = [];
                    snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                    
                    if (messages.length === 0) {
                        messagesContainer.innerHTML = '<div class="no-messages">💬 Нет сообщений</div>';
                        return;
                    }

                    let html = '';
                    messages.forEach(msg => {
                        const isOwn = msg.userId === currentUser?.uid;
                        const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString('ru-RU', { 
                            hour: '2-digit', minute: '2-digit' 
                        }) : '';
                        
                        html += `
                            <div class="message ${isOwn ? 'own' : ''}">
                                <span class="message-user">${msg.userName || 'Пользователь'}</span>
                                <span class="message-time">${time}</span>
                                <div class="message-text">${msg.text || ''}</div>
                            </div>
                        `;
                    });
                    
                    messagesContainer.innerHTML = html;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                });
        }

        // ========== ОТПРАВКА СООБЩЕНИЙ ==========
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = messageInput.value.trim() === '';
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !sendBtn.disabled) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            const displayName = userNickname || currentUser.displayName || 'Пользователь';

            try {
                await db.collection('chat').add({
                    text: text,
                    userId: currentUser.uid,
                    userName: displayName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                messageInput.value = '';
                sendBtn.disabled = true;
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Не удалось отправить сообщение');
            }
        }
    </script>
</body>
</html>
