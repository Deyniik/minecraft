<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Мессенджер</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Те же стили что и в index.html для боковой панели */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1600px;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
        }

        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.5rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.5rem;
        }

        .sidebar-category-title {
            padding: 0.5rem 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            background-color: var(--bg-button);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            color: var(--text-contrast);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .user-nick {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .google-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .google-btn svg {
            width: 1.1rem;
            height: 1.1rem;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 1rem;
        }

        .messenger-container {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            height: calc(100vh - 2rem);
            display: flex;
            overflow: hidden;
        }

        .chats-list {
            width: 280px;
            border-right: 1px solid var(--border-subtle);
            overflow-y: auto;
            background-color: var(--bg-body);
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid var(--border-subtle);
        }

        .chat-item:hover {
            background-color: var(--bg-button);
        }

        .chat-item.active {
            background-color: var(--bg-brand);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-name {
            color: var(--text-contrast);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .chat-last-message {
            color: var(--text-secondary);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            font-weight: 600;
            color: var(--text-contrast);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.5rem;
            max-width: 70%;
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .message-content {
            background-color: var(--bg-button);
            padding: 0.75rem;
            border-radius: 1rem;
            color: var(--text-primary);
        }

        .message.own .message-content {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .message-sender {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
            color: var(--text-contrast);
        }

        .message-text {
            word-break: break-word;
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            text-align: right;
        }

        .message-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--border-subtle);
        }

        .message-input {
            flex: 1;
            padding: 0.75rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            resize: none;
            max-height: 100px;
            outline: none;
        }

        .message-input:focus {
            border-color: var(--text-brand);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--text-brand);
            border: none;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background-color: var(--text-contrast);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        .no-chat-selected {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='/minecraft/'">Deynik <span>Minecraft</span></div>
            
            <div class="sidebar-category">
                <div class="sidebar-category-title">Главное</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/'">
                        <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9z"/><path d="M9 21v-6h6v6"/></svg>
                        Рекомендации
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html'">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Поиск
                    </button>
                    <button class="sidebar-item" id="savedBtn">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Сохраненные
                    </button>
                    <button class="sidebar-item active" id="messengerBtn">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Мессенджер
                    </button>
                </div>
            </div>

            <div class="sidebar-category">
                <div class="sidebar-category-title">Контент</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=mod'">
                        <svg viewBox="0 0 24 24"><path d="M20 7h-4.5L15 4H9L8.5 7H4v2h16V7z"/><rect x="4" y="9" width="16" height="10" rx="1"/><circle cx="8" cy="13" r="1"/><circle cx="16" cy="13" r="1"/></svg>
                        Моды
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=shader'">
                        <svg viewBox="0 0 24 24"><path d="M12 3v1M5 8h1M18 8h1M8 21h8M12 8v8"/><circle cx="12" cy="15" r="3"/><path d="M8 11L5 8M16 11l3-3"/></svg>
                        Шейдеры
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=resourcepack'">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M9 9l6 6M15 9l-6 6"/></svg>
                        Ресурспаки
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=modpack'">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16v2H4z"/><rect x="4" y="8" width="16" height="12" rx="1"/><path d="M10 12l2 2 4-4"/></svg>
                        Сборки
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=plugin'">
                        <svg viewBox="0 0 24 24"><path d="M20 12v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4"/><rect x="4" y="4" width="16" height="8" rx="1"/><circle cx="12" cy="12" r="2"/></svg>
                        Плагины
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html?type=datapack'">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 8h8v8H8z"/><path d="M12 12l2-2-2-2"/></svg>
                        Датапаки
                    </button>
                </div>
            </div>

            <!-- Пользовательская секция -->
            <div class="user-section" id="userSection">
                <div id="userInfo" style="display: none;">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div>
                        <div class="user-details">
                            <div class="user-name" id="userName"></div>
                            <div class="user-nick" id="userNick"></div>
                        </div>
                    </div>
                </div>
                <button class="google-btn" id="googleSignInBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Войти через Google
                </button>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <div class="messenger-container">
                <div class="chats-list" id="chatsList">
                    <div class="chat-item active" data-chat="general">
                        <div class="chat-avatar">#</div>
                        <div class="chat-info">
                            <div class="chat-name">Основной чат</div>
                            <div class="chat-last-message" id="lastMessage">Загрузка...</div>
                        </div>
                    </div>
                </div>
                
                <div class="chat-area" id="chatArea">
                    <div class="chat-header" id="chatHeader">Основной чат</div>
                    <div class="messages-container" id="messagesContainer">
                        <div class="loading">Загрузка сообщений...</div>
                    </div>
                    <div class="message-input-area">
                        <textarea class="message-input" id="messageInput" placeholder="Введите сообщение..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn">
                            <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBk4nxZ1ldNQUCxsbgaeYTkm9stq0o9o2Q",
            authDomain: "deygram-e4814.firebaseapp.com",
            projectId: "deygram-e4814",
            storageBucket: "deygram-e4814.firebasestorage.app",
            messagingSenderId: "591207353726",
            appId: "1:591207353726:web:d20f5e648d3daf86fcb72f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let unsubscribeMessages = null;

        // Элементы
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const lastMessageEl = document.getElementById('lastMessage');
        const userName = document.getElementById('userName');
        const userNick = document.getElementById('userNick');
        const userAvatar = document.getElementById('userAvatar');
        const userInfo = document.getElementById('userInfo');
        const googleSignInBtn = document.getElementById('googleSignInBtn');

        // Auth
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                userInfo.style.display = 'block';
                googleSignInBtn.style.display = 'none';
                
                userName.textContent = user.displayName || 'Пользователь';
                const nick = `@${user.email.split('@')[0]}`;
                userNick.textContent = nick;
                userAvatar.textContent = (user.displayName || 'U')[0].toUpperCase();
                
                loadMessages();
            } else {
                currentUser = null;
                userInfo.style.display = 'none';
                googleSignInBtn.style.display = 'flex';
                messagesContainer.innerHTML = '<div class="loading">Войдите, чтобы видеть сообщения</div>';
            }
        });

        googleSignInBtn.addEventListener('click', () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        });

        document.getElementById('savedBtn').addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы увидеть сохраненные проекты');
                return;
            }
            window.location.href = '/minecraft/saved.html';
        });

        // Загрузка сообщений
        function loadMessages() {
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }

            messagesContainer.innerHTML = '<div class="loading">Загрузка сообщений...</div>';

            unsubscribeMessages = db.collection('messages')
                .orderBy('timestamp', 'asc')
                .limit(50)
                .onSnapshot((snapshot) => {
                    const messages = [];
                    snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                    
                    if (messages.length === 0) {
                        messagesContainer.innerHTML = '<div class="loading">Нет сообщений. Будьте первым!</div>';
                        lastMessageEl.textContent = 'Нет сообщений';
                        return;
                    }

                    let html = '';
                    messages.forEach(msg => {
                        const isOwn = msg.userId === currentUser?.uid;
                        const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString() : '';
                        
                        html += `
                            <div class="message ${isOwn ? 'own' : ''}">
                                <div class="message-avatar">${msg.userName ? msg.userName[0].toUpperCase() : '?'}</div>
                                <div class="message-content">
                                    <div class="message-sender">${msg.userName || 'Пользователь'} ${msg.userNick || ''}</div>
                                    <div class="message-text">${escapeHtml(msg.text)}</div>
                                    <div class="message-time">${time}</div>
                                </div>
                            </div>
                        `;
                    });

                    messagesContainer.innerHTML = html;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;

                    // Обновляем последнее сообщение в списке чатов
                    const lastMsg = messages[messages.length - 1];
                    lastMessageEl.textContent = lastMsg ? 
                        `${lastMsg.userName}: ${lastMsg.text.substring(0, 30)}${lastMsg.text.length > 30 ? '...' : ''}` : 
                        'Нет сообщений';
                });
        }

        // Отправка сообщения
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            try {
                await db.collection('messages').add({
                    text: text,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || 'Пользователь',
                    userNick: `@${currentUser.email.split('@')[0]}`,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                messageInput.value = '';
                messageInput.style.height = 'auto';
            } catch (error) {
                console.error('Ошибка отправки:', error);
                alert('Не удалось отправить сообщение');
            }
        }

        // Авто-высота textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
