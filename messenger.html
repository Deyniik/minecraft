<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 100%;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --online-green: #23a55a;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.8rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 1rem;
            position: relative;
        }

        .messenger-container {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            height: calc(100vh - 2rem);
            display: flex;
            flex-direction: column;
            margin-right: 260px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            font-weight: 600;
            color: var(--text-contrast);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--bg-raised);
            border-radius: 1rem 1rem 0 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .message-group-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.2rem;
        }

        .group-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 0.9rem;
            object-fit: cover;
        }

        .group-username {
            font-weight: 600;
            color: var(--text-brand);
            font-size: 0.95rem;
        }

        .group-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .message {
            display: flex;
            gap: 1rem;
            padding: 0.2rem 0;
            position: relative;
        }

        .message-avatar-placeholder {
            width: 36px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-text {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .reply-preview {
            background: rgba(251, 191, 36, 0.1);
            border-left: 3px solid var(--text-brand);
            padding: 0.3rem 0.6rem;
            margin-bottom: 0.3rem;
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .reply-preview strong {
            color: var(--text-brand);
        }

        .message-reply {
            background: rgba(251, 191, 36, 0.05);
            border-left: 2px solid var(--text-brand);
            padding: 0.2rem 0.5rem;
            margin-bottom: 0.3rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .message-gif {
            max-width: 200px;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 0.25rem;
        }

        .message-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.2rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .message-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        .message-action-btn:hover {
            background-color: var(--bg-button);
            color: var(--text-brand);
        }

        .reactions-container {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.3rem;
            flex-wrap: wrap;
        }

        .reaction-badge {
            background-color: var(--bg-button);
            border-radius: 1rem;
            padding: 0.15rem 0.4rem;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reaction-badge:hover, .reaction-badge.active {
            background-color: var(--bg-brand);
        }

        .reaction-picker {
            position: absolute;
            background-color: var(--bg-raised);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            padding: 0.3rem;
            display: flex;
            gap: 0.2rem;
            z-index: 10;
        }

        .reaction-emoji {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }

        .reaction-emoji:hover {
            background-color: var(--bg-brand);
        }

        .reply-indicator {
            background: rgba(251, 191, 36, 0.1);
            border-left: 3px solid var(--text-brand);
            padding: 0.5rem 0.75rem;
            margin: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cancel-reply {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .message-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid var(--border-subtle);
            background-color: var(--bg-raised);
            border-radius: 0 0 1rem 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.7rem 1rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            resize: none;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input:focus {
            border-color: var(--text-brand);
        }

        .emoji-btn, .gif-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            width: 40px;
            border-radius: 50%;
        }

        .emoji-btn:hover, .gif-btn:hover {
            color: var(--text-brand);
            background-color: var(--bg-button);
        }

        .chat-send-btn {
            background: var(--bg-brand);
            border: none;
            color: var(--bg-body);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .emoji-picker, .gif-picker {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: var(--bg-raised);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1rem;
            width: 300px;
            display: none;
            z-index: 100;
        }

        .emoji-picker.show, .gif-picker.show {
            display: block;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 1.3rem;
            cursor: pointer;
            text-align: center;
            padding: 5px;
        }

        .emoji-item:hover {
            background-color: var(--bg-button);
            border-radius: 4px;
        }

        .gif-results {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .gif-item {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .users-panel {
            width: 240px;
            border-left: 1px solid var(--border-subtle);
            background-color: var(--bg-body);
            position: absolute;
            right: 1rem;
            top: 1rem;
            bottom: 1rem;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
        }

        .users-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .user-item:hover {
            background-color: var(--bg-button);
        }

        .user-item-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 0.8rem;
            object-fit: cover;
        }

        .online-indicator {
            position: absolute;
            bottom: 6px;
            left: 32px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--online-green);
            border: 2px solid var(--bg-body);
        }

        .user-item-info {
            flex: 1;
        }

        .user-item-name {
            color: var(--text-contrast);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .edit-modal-content {
            background: var(--bg-raised);
            border-radius: 1rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-subtle);
        }

        .edit-modal-content textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 0.5rem;
            color: var(--text-contrast);
            margin: 1rem 0;
            resize: vertical;
        }

        .edit-modal-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .edit-modal-buttons button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            border: none;
        }

        .edit-save {
            background: var(--text-brand);
            color: #000;
        }

        .edit-cancel {
            background: var(--bg-button);
            color: var(--text-contrast);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="messenger-container">
                <div class="chat-area">
                    <div class="chat-header">
                        <i class="fas fa-hashtag"></i> Общий чат
                    </div>
                    
                    <div class="messages-container" id="messagesContainer">
                        <div class="loading">Загрузка сообщений...</div>
                    </div>
                    
                    <div id="replyIndicator" class="reply-indicator" style="display: none;"></div>
                    
                    <div class="message-input-area">
                        <button class="emoji-btn" id="emojiBtn"><i class="far fa-smile"></i></button>
                        <button class="gif-btn" id="gifBtn">GIF</button>
                        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение... (@упомянуть)" maxlength="500">
                        <button class="chat-send-btn" id="sendBtn" disabled>Отправить</button>
                        
                        <div class="emoji-picker" id="emojiPicker">
                            <div class="emoji-grid" id="emojiGrid"></div>
                        </div>
                        
                        <div class="gif-picker" id="gifPicker">
                            <div class="gif-results" id="gifResults"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="users-panel">
                <div class="users-header">
                    <i class="fas fa-users"></i> ПОЛЬЗОВАТЕЛИ — <span id="onlineCount">0</span>
                </div>
                <div class="users-list" id="usersList">
                    <div class="loading">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <h3 style="color: var(--text-contrast);">Редактировать сообщение</h3>
            <textarea id="editInput" rows="3"></textarea>
            <div class="edit-modal-buttons">
                <button class="edit-cancel" id="cancelEdit">Отмена</button>
                <button class="edit-save" id="saveEdit">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/minecraft/common.js"></script>
    <script>
        let unsubscribeMessages = null;
        let replyingToMessage = null;
        let editingMessageId = null;
        let allUsers = [];
        let onlineUsers = new Set();
        
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const replyIndicator = document.getElementById('replyIndicator');
        const usersList = document.getElementById('usersList');
        const onlineCount = document.getElementById('onlineCount');
        
        const emojiBtn = document.getElementById('emojiBtn');
        const gifBtn = document.getElementById('gifBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const gifPicker = document.getElementById('gifPicker');
        const emojiGrid = document.getElementById('emojiGrid');
        const gifResults = document.getElementById('gifResults');
        
        const editModal = document.getElementById('editModal');
        const editInput = document.getElementById('editInput');
        const cancelEdit = document.getElementById('cancelEdit');
        const saveEdit = document.getElementById('saveEdit');
        
        const quickReactions = ['👍', '❤️', '😂', '😮', '😢', '😡'];
        
        const emojis = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','🤐','🥴','🤢','🤮','🤧','😷','🤒','🤕','🤑','🤠','😈','👿','👹','👺','🤡','💩','👻','💀','☠️','👽','👾','🤖','🎃'];
        
        window.loadSidebar();
        
        function loadEmojis() {
            emojiGrid.innerHTML = '';
            emojis.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'emoji-item';
                div.textContent = emoji;
                div.onclick = () => {
                    messageInput.value += emoji;
                    emojiPicker.classList.remove('show');
                    messageInput.focus();
                };
                emojiGrid.appendChild(div);
            });
        }
        
        async function searchGifs(query = '') {
            const term = query || 'minecraft';
            try {
                const response = await fetch(`https://g.tenor.com/v1/search?q=${encodeURIComponent(term)}&key=LIVDSRZULELA&limit=20`);
                const data = await response.json();
                gifResults.innerHTML = '';
                data.results.forEach(result => {
                    const url = result.media[0].gif.url;
                    const img = document.createElement('img');
                    img.className = 'gif-item';
                    img.src = url;
                    img.onclick = () => sendGif(url);
                    gifResults.appendChild(img);
                });
            } catch (error) {
                console.error('Ошибка поиска GIF:', error);
            }
        }
        
        async function sendGif(url) {
            if (!window.currentUser) return;
            await sendMessage(url, true);
            gifPicker.classList.remove('show');
        }
        
        emojiBtn.addEventListener('click', () => {
            emojiPicker.classList.toggle('show');
            gifPicker.classList.remove('show');
        });
        
        gifBtn.addEventListener('click', () => {
            gifPicker.classList.toggle('show');
            emojiPicker.classList.remove('show');
            if (gifPicker.classList.contains('show') && gifResults.children.length === 0) {
                searchGifs();
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) emojiPicker.classList.remove('show');
            if (!gifPicker.contains(e.target) && e.target !== gifBtn) gifPicker.classList.remove('show');
        });
        
        async function loadMessages() {
            if (unsubscribeMessages) unsubscribeMessages();
            
            messagesContainer.innerHTML = '<div class="loading">Загрузка сообщений...</div>';
            
            unsubscribeMessages = db.collection('chat')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const messages = [];
                    snapshot.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    renderMessages(messages);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                });
        }
        
        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesContainer.innerHTML = '<div class="loading">💬 Нет сообщений. Будьте первым!</div>';
                return;
            }
            
            let html = '';
            let lastUserId = null;
            let lastTime = null;
            let groupMessages = [];
            
            for (let i = 0; i < messages.length; i++) {
                const msg = messages[i];
                const nextMsg = messages[i + 1];
                groupMessages.push(msg);
                
                if (!nextMsg || nextMsg.userId !== msg.userId) {
                    const firstMsg = groupMessages[0];
                    const time = firstMsg.timestamp ? new Date(firstMsg.timestamp.toDate()).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
                    
                    const userData = allUsers.find(u => u.uid === firstMsg.userId);
                    const photoURL = userData?.photoURL || '';
                    const displayName = firstMsg.userName || 'Пользователь';
                    
                    html += `<div class="message-group" data-user="${firstMsg.userId}">`;
                    html += `
                        <div class="message-group-header">
                            <img class="group-avatar" src="${photoURL}" onerror="this.src=''; this.style.backgroundColor='var(--text-brand)'; this.textContent='${displayName.charAt(0)}'">
                            <span class="group-username">${window.escapeHtml(displayName)}</span>
                            <span class="group-time">${time}</span>
                        </div>
                    `;
                    
                    for (const groupMsg of groupMessages) {
                        let messageHtml = '';
                        if (groupMsg.replyTo) {
                            messageHtml += `<div class="reply-preview"><i class="fas fa-reply"></i> Ответ <strong>${window.escapeHtml(groupMsg.replyTo.userName)}</strong></div>`;
                        }
                        
                        let text = groupMsg.text || '';
                        const urlRegex = /(https?:\/\/[^\s]+)/g;
                        text = text.replace(urlRegex, '<a href="$&" target="_blank" style="color: var(--text-brand);">$&</a>');
                        const mentionRegex = /@(\w+)/g;
                        text = text.replace(mentionRegex, '<span style="color: var(--text-brand); font-weight: 500;">$&</span>');
                        
                        messageHtml += `<div class="message-text">${text}</div>`;
                        if (groupMsg.gif) messageHtml += `<img src="${groupMsg.gif}" class="message-gif">`;
                        
                        let reactionsHtml = '';
                        if (groupMsg.reactions) {
                            reactionsHtml = '<div class="reactions-container">';
                            Object.entries(groupMsg.reactions).forEach(([emoji, users]) => {
                                const userCount = Object.keys(users).length;
                                const isActive = users[window.currentUser?.uid];
                                reactionsHtml += `
                                    <span class="reaction-badge ${isActive ? 'active' : ''}" data-emoji="${emoji}" data-message-id="${groupMsg.id}">
                                        ${emoji} ${userCount}
                                    </span>
                                `;
                            });
                            reactionsHtml += '</div>';
                        }
                        
                        html += `
                            <div class="message" data-message-id="${groupMsg.id}" data-user-id="${groupMsg.userId}">
                                <div class="message-avatar-placeholder"></div>
                                <div class="message-content">
                                    ${messageHtml}
                                    ${reactionsHtml}
                                    <div class="message-actions">
                                        <button class="message-action-btn" onclick="replyToMessage('${groupMsg.id}', '${displayName}')"><i class="fas fa-reply"></i></button>
                                        <button class="message-action-btn" onclick="showReactionPicker('${groupMsg.id}')"><i class="far fa-smile"></i></button>
                                        ${window.currentUser?.uid === groupMsg.userId ? `
                                            <button class="message-action-btn" onclick="editMessage('${groupMsg.id}', '${window.escapeHtml(text).replace(/'/g, "\\'")}')"><i class="fas fa-edit"></i></button>
                                            <button class="message-action-btn" onclick="deleteMessage('${groupMsg.id}')"><i class="fas fa-trash-alt"></i></button>
                                        ` : ''}
                                        <button class="message-action-btn" onclick="copyMessageText('${window.escapeHtml(text).replace(/'/g, "\\'")}')"><i class="fas fa-copy"></i></button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    html += `</div>`;
                    groupMessages = [];
                }
            }
            
            messagesContainer.innerHTML = html;
            
            document.querySelectorAll('.reaction-badge').forEach(badge => {
                badge.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleReaction(badge.dataset.messageId, badge.dataset.emoji);
                });
            });
        }
        
        window.replyToMessage = function(messageId, userName) {
            replyingToMessage = { id: messageId, userName: userName };
            replyIndicator.style.display = 'flex';
            replyIndicator.innerHTML = `
                <span><i class="fas fa-reply"></i> Ответ <strong>${window.escapeHtml(userName)}</strong></span>
                <button class="cancel-reply" onclick="cancelReply()"><i class="fas fa-times"></i></button>
            `;
            messageInput.focus();
        };
        
        window.cancelReply = function() {
            replyingToMessage = null;
            replyIndicator.style.display = 'none';
        };
        
        window.showReactionPicker = function(messageId) {
            const picker = document.createElement('div');
            picker.className = 'reaction-picker';
            
            quickReactions.forEach(emoji => {
                const btn = document.createElement('span');
                btn.className = 'reaction-emoji';
                btn.textContent = emoji;
                btn.onclick = () => {
                    toggleReaction(messageId, emoji);
                    picker.remove();
                };
                picker.appendChild(btn);
            });
            
            const msgDiv = document.querySelector(`[data-message-id="${messageId}"]`);
            if (msgDiv) {
                msgDiv.appendChild(picker);
                setTimeout(() => picker.remove(), 3000);
            }
        };
        
        window.copyMessageText = function(text) {
            navigator.clipboard.writeText(text);
            window.showToast('Скопировано!', 'success');
        };
        
        window.editMessage = function(messageId, currentText) {
            editingMessageId = messageId;
            editInput.value = currentText;
            editModal.style.display = 'flex';
        };
        
        saveEdit.addEventListener('click', async () => {
            const newText = editInput.value.trim();
            if (!newText || !editingMessageId) return;
            
            try {
                await db.collection('chat').doc(editingMessageId).update({
                    text: newText,
                    edited: true
                });
                editModal.style.display = 'none';
                editingMessageId = null;
                window.showToast('Сообщение обновлено', 'success');
            } catch (error) {
                console.error('Ошибка редактирования:', error);
                window.showToast('Не удалось отредактировать', 'error');
            }
        });
        
        cancelEdit.addEventListener('click', () => {
            editModal.style.display = 'none';
            editingMessageId = null;
        });
        
        window.deleteMessage = async function(messageId) {
            if (!confirm('Удалить сообщение?')) return;
            try {
                await db.collection('chat').doc(messageId).delete();
                window.showToast('Сообщение удалено', 'success');
            } catch (error) {
                console.error('Ошибка удаления:', error);
                window.showToast('Не удалось удалить', 'error');
            }
        };
        
        async function toggleReaction(messageId, emoji) {
            if (!window.currentUser) return;
            
            try {
                const messageRef = db.collection('chat').doc(messageId);
                const doc = await messageRef.get();
                if (doc.exists) {
                    const message = doc.data();
                    const reactions = message.reactions || {};
                    const userReactions = reactions[emoji] || {};
                    
                    if (userReactions[window.currentUser.uid]) {
                        delete userReactions[window.currentUser.uid];
                        if (Object.keys(userReactions).length === 0) {
                            delete reactions[emoji];
                        } else {
                            reactions[emoji] = userReactions;
                        }
                    } else {
                        userReactions[window.currentUser.uid] = true;
                        reactions[emoji] = userReactions;
                    }
                    await messageRef.update({ reactions });
                }
            } catch (error) {
                console.error('Ошибка реакции:', error);
            }
        }
        
        messageInput.addEventListener('input', () => {
            sendBtn.disabled = messageInput.value.trim() === '';
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !sendBtn.disabled) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        async function sendMessage(gifUrl = null, isGif = false) {
            const text = messageInput.value.trim();
            if (!text && !isGif) return;
            if (!window.currentUser) {
                window.showToast('Войдите, чтобы отправлять сообщения', 'error');
                return;
            }
            
            const messageData = {
                userId: window.currentUser.uid,
                userName: window.currentUser.displayName || 'Пользователь',
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                reactions: {}
            };
            
            if (isGif) {
                messageData.gif = gifUrl;
            } else {
                messageData.text = text;
            }
            
            if (replyingToMessage) {
                messageData.replyTo = {
                    messageId: replyingToMessage.id,
                    userName: replyingToMessage.userName
                };
            }
            
            try {
                await db.collection('chat').add(messageData);
                messageInput.value = '';
                sendBtn.disabled = true;
                cancelReply();
            } catch (error) {
                console.error('Ошибка отправки:', error);
                window.showToast('Не удалось отправить', 'error');
            }
        }
        
        async function loadUsers() {
            db.collection('users').onSnapshot((snapshot) => {
                allUsers = [];
                snapshot.forEach(doc => {
                    allUsers.push(doc.data());
                });
                
                db.collection('onlineUsers').onSnapshot((onlineSnapshot) => {
                    onlineUsers.clear();
                    onlineSnapshot.forEach(doc => {
                        if (doc.data().online) onlineUsers.add(doc.id);
                    });
                    renderUsers();
                });
            });
        }
        
        function renderUsers() {
            let html = '';
            const currentUserData = allUsers.find(u => u.uid === window.currentUser?.uid);
            
            if (currentUserData) {
                html += `
                    <div class="user-item" style="background: var(--bg-brand); margin-bottom: 0.5rem;">
                        <img class="user-item-avatar" src="${currentUserData.photoURL || ''}" onerror="this.src=''; this.style.backgroundColor='var(--text-brand)'; this.textContent='${(currentUserData.displayName || 'U').charAt(0)}'">
                        <span class="online-indicator"></span>
                        <div class="user-item-info">
                            <div class="user-item-name">${window.escapeHtml(currentUserData.displayName || 'Пользователь')} (вы)</div>
                        </div>
                    </div>
                `;
            }
            
            allUsers.forEach(user => {
                if (user.uid !== window.currentUser?.uid) {
                    const isOnline = onlineUsers.has(user.uid);
                    html += `
                        <div class="user-item">
                            <img class="user-item-avatar" src="${user.photoURL || ''}" onerror="this.src=''; this.style.backgroundColor='var(--text-brand)'; this.textContent='${(user.displayName || 'U').charAt(0)}'">
                            ${isOnline ? '<span class="online-indicator"></span>' : ''}
                            <div class="user-item-info">
                                <div class="user-item-name">${window.escapeHtml(user.displayName || 'Пользователь')}</div>
                            </div>
                        </div>
                    `;
                }
            });
            
            usersList.innerHTML = html || '<div class="loading">Нет пользователей</div>';
            onlineCount.textContent = onlineUsers.size;
        }
        
        function setupUserOnline() {
            if (!window.currentUser) return;
            const userRef = db.collection('onlineUsers').doc(window.currentUser.uid);
            const setOnline = () => {
                userRef.set({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp(), uid: window.currentUser.uid });
            };
            setOnline();
            const interval = setInterval(setOnline, 30000);
            window.addEventListener('beforeunload', () => {
                clearInterval(interval);
                userRef.update({ online: false });
            });
        }
        
        function checkPendingShare() {
            const pending = localStorage.getItem('pendingShare');
            if (pending) {
                localStorage.removeItem('pendingShare');
                try {
                    const shareData = JSON.parse(pending);
                    const message = `📦 Поделился проектом: ${shareData.title}\n🔗 /minecraft/project.html#${shareData.projectType}/${shareData.projectSlug}`;
                    db.collection('chat').add({
                        text: message,
                        userId: window.currentUser.uid,
                        userName: window.currentUser.displayName || 'Пользователь',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        reactions: {}
                    });
                } catch(e) {}
            }
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                window.currentUser = user;
                await window.loadSavedProjects();
                loadMessages();
                loadUsers();
                setupUserOnline();
                setTimeout(checkPendingShare, 1000);
            } else {
                window.currentUser = null;
                messagesContainer.innerHTML = '<div class="loading">🔒 Войдите, чтобы видеть сообщения</div>';
                if (unsubscribeMessages) unsubscribeMessages();
            }
        });
        
        loadEmojis();
    </script>
</body>
</html>
