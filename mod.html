<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Мод</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px; /* Уменьшил ширину */
            width: 100%;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0; /* Чуть жирнее */
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            
            /* Цвета загрузчиков (полупрозрачные для таблицы) */
            --color-fabric: #dbb69b;
            --color-fabric-alpha: rgba(219, 182, 155, 0.3);
            --color-forge: #959eef;
            --color-forge-alpha: rgba(149, 158, 239, 0.3);
            --color-neoforge: #f99e6b;
            --color-neoforge-alpha: rgba(249, 158, 107, 0.3);
            --color-quilt: #c796f9;
            --color-quilt-alpha: rgba(199, 150, 249, 0.3);
            
            /* Цвета для статусов версий */
            --color-release: #2bde73;
            --color-beta: #fbbf24;
        }

        /* Общий текст чуть жирнее */
        body, .project-description, .info-grid, .tag, .version-number, .game-version {
            font-weight: 450;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            cursor: pointer;
            background: none;
            border: none;
        }

        .back-btn:hover {
            color: var(--text-brand);
        }

        .back-btn svg {
            width: 1.25rem;
            height: 1.25rem;
            stroke: currentColor;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            cursor: pointer;
        }

        .logo span {
            color: var(--text-brand);
        }

        .loading, .error {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .error {
            color: #ef4444;
        }

        /* Шапка проекта */
        .project-header {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            position: relative;
        }

        .project-icon {
            width: 128px;
            height: 128px;
            border-radius: 1rem;
            background-color: var(--bg-button);
            object-fit: cover;
        }

        .project-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        .project-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-contrast);
            line-height: 1.2;
        }

        .download-top-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--bg-brand);
            color: var(--text-brand);
            padding: 0.6rem 1.2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .download-top-btn:hover {
            background-color: var(--text-brand);
            color: var(--bg-body);
        }

        .download-top-btn svg {
            width: 1.2rem;
            height: 1.2rem;
            stroke: currentColor;
        }

        .project-author {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .project-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-item svg {
            width: 1.5rem;
            height: 1.5rem;
            stroke: currentColor;
            fill: none;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-contrast);
        }

        .stat-label {
            font-size: 0.9rem;
        }

        .project-description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .gallery-section {
            margin-bottom: 2rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .gallery-image {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border-subtle);
        }

        .gallery-image:hover {
            transform: scale(1.02);
            border-color: var(--text-brand);
        }

        /* Модальное окно для галереи */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 2rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
        }

        .project-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .detail-section {
            background-color: var(--bg-raised);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-contrast);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            color: var(--text-primary);
        }

        .info-grid strong {
            color: var(--text-contrast);
            font-weight: 600;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 9999px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .link-item:hover {
            background-color: var(--bg-button);
            color: var(--text-brand);
        }

        .link-item svg {
            width: 1.25rem;
            height: 1.25rem;
            stroke: currentColor;
        }

        /* Секция версий */
        .versions-section {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .versions-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .versions-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-contrast);
            margin-bottom: 1rem;
        }

        /* Фильтры загрузчиков */
        .loader-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .loader-badge-filter {
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .loader-badge-filter:hover {
            filter: brightness(1.2);
        }

        .loader-badge-filter.active {
            border-color: var(--text-brand);
            box-shadow: 0 0 0 1px var(--text-brand);
        }

        .loader-badge-filter[data-loader="fabric"] {
            background-color: var(--color-fabric);
            color: white;
        }

        .loader-badge-filter[data-loader="forge"] {
            background-color: var(--color-forge);
            color: white;
        }

        .loader-badge-filter[data-loader="neoforge"] {
            background-color: var(--color-neoforge);
            color: white;
        }

        .loader-badge-filter[data-loader="quilt"] {
            background-color: var(--color-quilt);
            color: white;
        }

        /* Таблица версий */
        .versions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .versions-table th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-subtle);
            background-color: rgba(0, 0, 0, 0.2);
        }

        .versions-table td {
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
        }

        .versions-table tr:hover td {
            background-color: var(--bg-button);
        }

        /* Ячейка с версией и статусом */
        .version-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .version-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .version-status.release {
            background-color: var(--color-release);
            color: #000;
        }

        .version-status.beta {
            background-color: var(--color-beta);
            color: #000;
        }

        .version-number {
            font-weight: 600;
            color: var(--text-contrast);
            font-size: 1rem;
        }

        /* Загрузчики в таблице (полупрозрачные) */
        .loader-badge-table {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-right: 0.25rem;
            margin-bottom: 0.25rem;
            background-color: rgba(128, 128, 128, 0.2);
        }

        .loader-badge-table.fabric {
            background-color: var(--color-fabric-alpha);
        }

        .loader-badge-table.forge {
            background-color: var(--color-forge-alpha);
        }

        .loader-badge-table.neoforge {
            background-color: var(--color-neoforge-alpha);
        }

        .loader-badge-table.quilt {
            background-color: var(--color-quilt-alpha);
        }

        .game-versions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .game-version {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 0.25rem;
            padding: 0.15rem 0.4rem;
            font-size: 0.75rem;
            color: var(--text-primary);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--bg-brand);
            color: var(--text-brand);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .download-btn:hover {
            background-color: var(--text-brand);
            color: var(--bg-body);
        }

        .download-btn svg {
            width: 1rem;
            height: 1rem;
            stroke: currentColor;
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.1s;
            padding: 0 0.5rem;
        }

        .page-btn:hover:not(:disabled) {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .page-btn.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
            border-color: var(--text-brand);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-versions {
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- Модальное окно для галереи -->
    <div class="modal" id="galleryModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <div class="container">
        <!-- Навигация -->
        <div class="nav-bar">
            <button class="back-btn" onclick="window.location.href='/minecraft/'">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                На главную
            </button>
            <div class="logo" onclick="window.location.href='/minecraft/'">Deynik <span>Minecraft</span></div>
        </div>

        <!-- Контейнер для данных -->
        <div id="projectContent">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const API_BASE = 'https://api.modrinth.com/v2';
        const TRANSLATE_API = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=';

        // ========== ПОЛУЧАЕМ SLUG ИЗ URL ==========
        function getProjectInfoFromUrl() {
            const hash = window.location.hash.substring(1);
            const parts = hash.split('/');
            
            if (parts.length >= 2) {
                return {
                    type: parts[0],
                    slug: parts[1]
                };
            }
            return null;
        }

        const projectInfo = getProjectInfoFromUrl();
        const projectContent = document.getElementById('projectContent');
        
        if (!projectInfo) {
            projectContent.innerHTML = `
                <div class="error">
                    ❌ Не указан проект<br>
                    <button onclick="window.location.href='/minecraft/'" style="color: var(--text-brand); margin-top: 1rem; padding: 0.5rem 1rem; background: none; border: 1px solid var(--text-brand); border-radius: 0.5rem; cursor: pointer;">Вернуться на главную</button>
                </div>
            `;
        }

        const projectType = projectInfo.type;
        const projectSlug = projectInfo.slug;

        // Состояние
        let projectData = null;
        let allVersions = [];
        let filteredVersions = [];
        let cachedTranslations = new Map();
        let translateEnabled = true; // Всегда русский

        // Фильтры и пагинация
        let selectedLoader = null;
        const VERSIONS_PER_PAGE = 10;
        let currentPage = 1;
        let availableLoaders = [];

        // ========== ПЕРЕВОД ==========
        async function translateText(text) {
            if (!text || text.length < 20) return text;
            if (cachedTranslations.has(text)) return cachedTranslations.get(text);
            
            try {
                const response = await fetch(TRANSLATE_API + encodeURIComponent(text));
                const data = await response.json();
                const translated = data[0][0][0];
                cachedTranslations.set(text, translated);
                return translated;
            } catch (error) {
                console.warn('Ошибка перевода:', error);
                return text;
            }
        }

        // ========== ФУНКЦИЯ ДЛЯ ГАЛЕРЕИ ==========
        window.openModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('galleryModal').classList.add('show');
        };

        window.closeModal = function() {
            document.getElementById('galleryModal').classList.remove('show');
        };

        // ========== ФУНКЦИЯ ДЛЯ ПРОКРУТКИ К ВЕРСИЯМ ==========
        window.scrollToVersions = function() {
            document.getElementById('versions-section').scrollIntoView({ behavior: 'smooth' });
        };

        // ========== ФУНКЦИЯ ДЛЯ ВЫБОРА ЗАГРУЗЧИКА ==========
        window.toggleLoader = function(loader) {
            if (selectedLoader === loader) {
                selectedLoader = null;
            } else {
                selectedLoader = loader;
            }
            currentPage = 1;
            applyFilters();
            renderProject();
        };

        // ========== ФУНКЦИЯ ДЛЯ ПАГИНАЦИИ ==========
        window.goToPage = function(page) {
            currentPage = page;
            renderProject();
        };

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        async function loadProject() {
            try {
                projectContent.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
                
                // Загружаем основную информацию
                const projectResponse = await fetch(`${API_BASE}/project/${projectSlug}`);
                if (!projectResponse.ok) throw new Error('Проект не найден');
                projectData = await projectResponse.json();

                // Загружаем все версии
                const versionsResponse = await fetch(`${API_BASE}/project/${projectSlug}/version`);
                allVersions = await versionsResponse.json();

                // Получаем уникальные загрузчики
                const loadersSet = new Set();
                allVersions.forEach(version => {
                    version.loaders.forEach(loader => loadersSet.add(loader));
                });
                availableLoaders = Array.from(loadersSet).sort();

                // Переводим описание
                if (projectData.description) {
                    projectContent.innerHTML = '<div class="loading">🔄 Переводим описание...</div>';
                    await translateText(projectData.description);
                }

                // Применяем фильтры
                applyFilters();

                // Отображаем
                renderProject();

            } catch (error) {
                console.error('Ошибка:', error);
                projectContent.innerHTML = `
                    <div class="error">
                        ❌ Ошибка: ${error.message}<br>
                        <button onclick="window.location.href='/minecraft/'" style="color: var(--text-brand); margin-top: 1rem; padding: 0.5rem 1rem; background: none; border: 1px solid var(--text-brand); border-radius: 0.5rem; cursor: pointer;">Вернуться на главную</button>
                    </div>
                `;
            }
        }

        // ========== ПРИМЕНЕНИЕ ФИЛЬТРОВ ==========
        function applyFilters() {
            filteredVersions = allVersions.filter(version => {
                if (selectedLoader && !version.loaders.includes(selectedLoader)) {
                    return false;
                }
                return true;
            });
        }

        // ========== ФОРМАТИРОВАНИЕ ЧИСЕЛ ==========
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
            if (num >= 1_000) return (num / 1_000).toFixed(1) + 'k';
            return num.toString();
        }

        // ========== ФОРМАТИРОВАНИЕ ДАТЫ ==========
        function formatRelativeDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 7) {
                return `${diffDays} ${getDaysWord(diffDays)} назад`;
            } else if (diffDays < 30) {
                const weeks = Math.floor(diffDays / 7);
                return `${weeks} ${getWeeksWord(weeks)} назад`;
            } else if (diffDays < 365) {
                const months = Math.floor(diffDays / 30);
                return `${months} ${getMonthsWord(months)} назад`;
            } else {
                const years = Math.floor(diffDays / 365);
                return `${years} ${getYearsWord(years)} назад`;
            }
        }

        function getDaysWord(days) {
            if (days === 1) return 'день';
            if (days >= 2 && days <= 4) return 'дня';
            return 'дней';
        }

        function getWeeksWord(weeks) {
            if (weeks === 1) return 'неделю';
            if (weeks >= 2 && weeks <= 4) return 'недели';
            return 'недель';
        }

        function getMonthsWord(months) {
            if (months === 1) return 'месяц';
            if (months >= 2 && months <= 4) return 'месяца';
            return 'месяцев';
        }

        function getYearsWord(years) {
            if (years === 1) return 'год';
            if (years >= 2 && years <= 4) return 'года';
            return 'лет';
        }

        // ========== ОПРЕДЕЛЕНИЕ СТАТУСА ВЕРСИИ ==========
        function getVersionStatus(version) {
            const versionStr = version.version_number.toLowerCase();
            const gameVersions = version.game_versions.join(' ').toLowerCase();
            
            if (versionStr.includes('beta') || versionStr.includes('pre') || 
                gameVersions.includes('beta') || gameVersions.includes('pre') ||
                gameVersions.includes('snapshot') || gameVersions.includes('w')) {
                return { type: 'beta', letter: 'B' };
            }
            return { type: 'release', letter: 'R' };
        }

        // ========== ПОЛУЧЕНИЕ ОПИСАНИЯ ==========
        function getDescription() {
            if (!projectData || !projectData.description) return 'Нет описания';
            const cached = cachedTranslations.get(projectData.description);
            return cached || projectData.description;
        }

        // ========== ПОЛУЧЕНИЕ ЦВЕТА ЗАГРУЗЧИКА ==========
        function getLoaderClass(loader) {
            switch(loader.toLowerCase()) {
                case 'fabric': return 'fabric';
                case 'forge': return 'forge';
                case 'neoforge': return 'neoforge';
                case 'quilt': return 'quilt';
                default: return '';
            }
        }

        // ========== ОТРИСОВКА ==========
        function renderProject() {
            const iconUrl = projectData.icon_url || 'https://via.placeholder.com/128/2c2c30/a0a0a8?text=Mod';
            
            // Получаем ссылки
            const links = [];
            if (projectData.source_url) links.push({ type: 'source', url: projectData.source_url, name: 'Исходный код' });
            if (projectData.issues_url) links.push({ type: 'issues', url: projectData.issues_url, name: 'Сообщить о проблеме' });
            if (projectData.wiki_url) links.push({ type: 'wiki', url: projectData.wiki_url, name: 'Wiki' });
            if (projectData.discord_url) links.push({ type: 'discord', url: projectData.discord_url, name: 'Discord' });

            const description = getDescription();

            // Формируем фильтры загрузчиков
            const loaderFilters = `
                <div class="loader-badges">
                    ${availableLoaders.map(loader => `
                        <span class="loader-badge-filter ${getLoaderClass(loader)} ${selectedLoader === loader ? 'active' : ''}" 
                              data-loader="${loader}" onclick="toggleLoader('${loader}')">${loader}</span>
                    `).join('')}
                </div>
            `;

            // Пагинация
            const totalPages = Math.ceil(filteredVersions.length / VERSIONS_PER_PAGE);
            const startIndex = (currentPage - 1) * VERSIONS_PER_PAGE;
            const endIndex = Math.min(startIndex + VERSIONS_PER_PAGE, filteredVersions.length);
            const paginatedVersions = filteredVersions.slice(startIndex, endIndex);

            // Формируем кнопки пагинации
            let paginationButtons = '';
            if (totalPages > 1) {
                paginationButtons += '<div class="pagination">';
                
                paginationButtons += `
                    <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} 
                            onclick="goToPage(${currentPage - 1})">←</button>
                `;
                
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, currentPage + 2);
                
                for (let i = startPage; i <= endPage; i++) {
                    paginationButtons += `
                        <button class="page-btn ${i === currentPage ? 'active' : ''}" 
                                onclick="goToPage(${i})">${i}</button>
                    `;
                }
                
                paginationButtons += `
                    <button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} 
                            onclick="goToPage(${currentPage + 1})">→</button>
                `;
                
                paginationButtons += '</div>';
            }

            // Формируем таблицу версий
            const versionsTable = filteredVersions.length > 0 ? `
                <table class="versions-table">
                    <thead>
                        <tr>
                            <th>Версия</th>
                            <th>Загрузчики</th>
                            <th>Версии</th>
                            <th>Дата</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${paginatedVersions.map(version => {
                            const status = getVersionStatus(version);
                            
                            return `
                            <tr>
                                <td>
                                    <div class="version-cell">
                                        <div class="version-status ${status.type}">${status.letter}</div>
                                        <span class="version-number">${escapeHtml(version.version_number)}</span>
                                    </div>
                                </td>
                                <td>
                                    ${version.loaders.map(loader => 
                                        `<span class="loader-badge-table ${getLoaderClass(loader)}">${loader}</span>`
                                    ).join('')}
                                </td>
                                <td>
                                    <div class="game-versions">
                                        ${version.game_versions.slice(0, 3).map(gv => 
                                            `<span class="game-version">${gv}</span>`
                                        ).join('')}
                                        ${version.game_versions.length > 3 ? 
                                            `<span class="game-version">+${version.game_versions.length - 3}</span>` : ''}
                                    </div>
                                </td>
                                <td>${formatRelativeDate(version.date_published)}</td>
                                <td>
                                    <a href="${version.files[0]?.url}" class="download-btn" target="_blank">
                                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                                        Скачать
                                    </a>
                                </td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
                ${paginationButtons}
            ` : '<div class="no-versions">Нет версий</div>';

            let html = `
                <div class="project-header">
                    <img src="${iconUrl}" class="project-icon" alt="${escapeHtml(projectData.title)}"
                         onerror="this.src='https://via.placeholder.com/128/2c2c30/a0a0a8?text=Mod'">
                    <div class="project-info">
                        <div class="project-name-row">
                            <h1 class="project-name">${escapeHtml(projectData.title)}</h1>
                            <button class="download-top-btn" onclick="scrollToVersions()">
                                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                                Скачать
                            </button>
                        </div>
                        <div class="project-author">by ${escapeHtml(projectData.author || 'Неизвестен')}</div>
                        <div class="project-stats">
                            <div class="stat-item">
                                <svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1m-4-4-4 4m0 0-4-4m4 4V4"/></svg>
                                <div>
                                    <div class="stat-value">${formatNumber(projectData.downloads)}</div>
                                    <div class="stat-label">скачиваний</div>
                                </div>
                            </div>
                            <div class="stat-item">
                                <svg viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2"/></svg>
                                <div>
                                    <div class="stat-value">${formatRelativeDate(projectData.updated)}</div>
                                    <div class="stat-label">обновлено</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="project-description">
                    ${escapeHtml(description)}
                </div>

                ${projectData.gallery && projectData.gallery.length > 0 ? `
                    <div class="gallery-section">
                        <h3 class="section-title">🖼️ Галерея</h3>
                        <div class="gallery">
                            ${projectData.gallery.map(img => `
                                <img src="${img.url}" class="gallery-image" onclick="openModal('${img.url}')">
                            `).join('')}
                        </div>
                    </div>
                ` : ''}

                <div class="project-details">
                    <div class="detail-section">
                        <h3 class="section-title">📦 Информация</h3>
                        <div class="info-grid">
                            <div><strong>Лицензия:</strong> ${escapeHtml(projectData.license?.name || 'Не указана')}</div>
                            <div><strong>Статус:</strong> ${escapeHtml(projectData.status || 'Неизвестно')}</div>
                            <div><strong>Сторона клиента:</strong> ${escapeHtml(projectData.client_side || 'Неизвестно')}</div>
                            <div><strong>Сторона сервера:</strong> ${escapeHtml(projectData.server_side || 'Неизвестно')}</div>
                            <div><strong>Дата создания:</strong> ${formatRelativeDate(projectData.published)}</div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3 class="section-title">🏷️ Категории</h3>
                        <div class="tags">
                            ${(projectData.categories || []).map(cat => 
                                `<span class="tag">${escapeHtml(cat)}</span>`
                            ).join('')}
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3 class="section-title">🔗 Ссылки</h3>
                        <div class="link-list">
                            <a href="https://modrinth.com/${projectType}/${projectSlug}" target="_blank" class="link-item">
                                <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                Страница на Modrinth
                            </a>
                            ${links.map(link => `
                                <a href="${escapeHtml(link.url)}" target="_blank" class="link-item">
                                    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
                                    ${escapeHtml(link.name)}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="versions-section" id="versions-section">
                    <div class="versions-header">
                        <h3 class="versions-title">📥 Версии</h3>
                        ${loaderFilters}
                    </div>
                    ${versionsTable}
                </div>
            `;

            projectContent.innerHTML = html;
        }

        // ========== ЗАЩИТА ОТ XSS ==========
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ========== СЛЕДИМ ЗА ИЗМЕНЕНИЕМ HASH ==========
        window.addEventListener('hashchange', () => {
            window.location.reload();
        });

        // Закрытие модального окна по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Запуск
        if (projectInfo) {
            loadProject();
        }
    </script>
</body>
</html>
