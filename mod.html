<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Моды</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 100%;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            
            --color-fabric: #dbb69b;
            --color-forge: #959eef;
            --color-neoforge: #f99e6b;
            --color-quilt: #c796f9;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.8rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar-logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.5rem;
        }

        .sidebar-category-title {
            padding: 0.5rem 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 0.8rem;
            border-radius: 0.6rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.4rem;
            height: 1.4rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding: 0.6rem;
            border-radius: 0.6rem;
            background-color: var(--bg-button);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            color: var(--text-contrast);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.95rem;
        }

        .user-nick {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.7rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .google-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .google-btn svg {
            width: 1.2rem;
            height: 1.2rem;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 2rem;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-contrast);
        }

        .page-title span {
            color: var(--text-brand);
        }

        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-select {
            padding: 0.5rem 1rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            outline: none;
        }

        .filter-select:hover {
            border-color: var(--text-brand);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .project-card {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-shadow);
        }

        .card-header {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 0.75rem;
            background-color: var(--bg-button);
            object-fit: cover;
        }

        .card-info {
            flex: 1;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-contrast);
            margin-bottom: 0.25rem;
        }

        .card-author {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .card-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-stats i {
            margin-right: 0.25rem;
        }

        .card-description {
            padding: 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .card-btn {
            padding: 0.4rem 1rem;
            background-color: var(--bg-button);
            border: none;
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .card-btn:hover {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .loader-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-right: 0.3rem;
            margin-bottom: 0.3rem;
            color: #000;
        }

        .loader-badge.fabric { background-color: var(--color-fabric); }
        .loader-badge.forge { background-color: var(--color-forge); }
        .loader-badge.neoforge { background-color: var(--color-neoforge); }
        .loader-badge.quilt { background-color: var(--color-quilt); }

        .loading, .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            padding: 1rem;
        }

        .page-btn {
            min-width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .page-btn.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
            border-color: var(--text-brand);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">Моды <span>для Minecraft</span></h1>
                    <div class="filter-bar">
                        <select class="filter-select" id="versionFilter">
                            <option value="">Все версии</option>
                            <option value="1.21">1.21+</option>
                            <option value="1.20">1.20+</option>
                            <option value="1.19">1.19+</option>
                            <option value="1.18">1.18+</option>
                            <option value="1.17">1.17+</option>
                            <option value="1.16">1.16+</option>
                        </select>
                        <select class="filter-select" id="loaderFilter">
                            <option value="">Все загрузчики</option>
                            <option value="fabric">Fabric</option>
                            <option value="forge">Forge</option>
                            <option value="neoforge">NeoForge</option>
                            <option value="quilt">Quilt</option>
                        </select>
                        <select class="filter-select" id="sortFilter">
                            <option value="downloads">По скачиваниям</option>
                            <option value="updated">По обновлению</option>
                            <option value="newest">По дате</option>
                        </select>
                    </div>
                </div>

                <div class="projects-grid" id="projectsGrid">
                    <div class="loading">Загрузка модов...</div>
                </div>

                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/minecraft/common.js"></script>
    <script>
        const API_BASE = 'https://api.modrinth.com/v2';
        const PROJECT_TYPE = 'mod';
        
        let currentProjects = [];
        let currentPage = 1;
        let totalPages = 0;
        let isLoading = false;
        
        const versionFilter = document.getElementById('versionFilter');
        const loaderFilter = document.getElementById('loaderFilter');
        const sortFilter = document.getElementById('sortFilter');
        const projectsGrid = document.getElementById('projectsGrid');
        const paginationDiv = document.getElementById('pagination');
        
        window.loadSidebar();
        
        function getSortValue() {
            const sort = sortFilter.value;
            switch(sort) {
                case 'downloads': return 'downloads';
                case 'updated': return 'updated';
                default: return 'newest';
            }
        }
        
        async function loadProjects() {
            if (isLoading) return;
            isLoading = true;
            
            projectsGrid.innerHTML = '<div class="loading">Загрузка модов...</div>';
            
            try {
                const facets = [[`project_type:${PROJECT_TYPE}`]];
                
                if (versionFilter.value) {
                    facets.push([`versions:${versionFilter.value}`]);
                }
                
                const url = `${API_BASE}/search?limit=12&offset=${(currentPage - 1) * 12}&index=${getSortValue()}&facets=${encodeURIComponent(JSON.stringify(facets))}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                currentProjects = data.hits || [];
                totalPages = Math.ceil(data.total_hits / 12);
                
                if (loaderFilter.value) {
                    const loaderPromises = currentProjects.map(async (project) => {
                        try {
                            const versionRes = await fetch(`${API_BASE}/project/${project.slug}/version?limit=5`);
                            const versions = await versionRes.json();
                            const hasLoader = versions.some(v => v.loaders.includes(loaderFilter.value));
                            return { project, hasLoader };
                        } catch {
                            return { project, hasLoader: false };
                        }
                    });
                    
                    const loaderResults = await Promise.all(loaderPromises);
                    currentProjects = loaderResults.filter(r => r.hasLoader).map(r => r.project);
                    totalPages = Math.ceil(currentProjects.length / 12);
                }
                
                for (const project of currentProjects) {
                    if (project.description && !window.cachedTranslations.has(project.description)) {
                        await window.translateText(project.description);
                    }
                }
                
                renderProjects();
                renderPagination();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                projectsGrid.innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            } finally {
                isLoading = false;
            }
        }
        
        async function getProjectLoaders(slug) {
            try {
                const response = await fetch(`${API_BASE}/project/${slug}/version?limit=5`);
                const versions = await response.json();
                const loaders = new Set();
                versions.forEach(v => {
                    v.loaders.forEach(l => loaders.add(l));
                });
                return Array.from(loaders);
            } catch {
                return [];
            }
        }
        
        async function renderProjects() {
            if (currentProjects.length === 0) {
                projectsGrid.innerHTML = '<div class="no-results">😢 Моды не найдены</div>';
                return;
            }
            
            let html = '';
            
            for (const project of currentProjects) {
                const description = window.cachedTranslations.get(project.description) || project.description || 'Нет описания';
                const iconUrl = project.icon_url || 'https://via.placeholder.com/56/2c2c30/a0a0a8?text=Mod';
                const loaders = await getProjectLoaders(project.slug);
                
                const loaderBadges = loaders.map(loader => 
                    `<span class="loader-badge ${loader.toLowerCase()}">${loader}</span>`
                ).join('');
                
                html += `
                    <div class="project-card" onclick="window.location.href='/minecraft/project.html#${PROJECT_TYPE}/${project.slug}'">
                        <div class="card-header">
                            <img src="${iconUrl}" class="card-icon" alt="${window.escapeHtml(project.title)}" onerror="this.src='https://via.placeholder.com/56/2c2c30/a0a0a8?text=Mod'">
                            <div class="card-info">
                                <div class="card-title">${window.escapeHtml(project.title)}</div>
                                <div class="card-author">${window.escapeHtml(project.author || 'Неизвестен')}</div>
                                <div class="card-stats">
                                    <span><i class="fas fa-download"></i> ${window.formatNumber(project.downloads)}</span>
                                    <span><i class="far fa-heart"></i> ${window.formatNumber(project.follows)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-description">
                            ${window.escapeHtml(description)}
                        </div>
                        <div class="card-footer">
                            ${loaderBadges}
                            <button class="card-btn" onclick="event.stopPropagation(); window.location.href='/minecraft/project.html#${PROJECT_TYPE}/${project.slug}'">
                                Подробнее <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                `;
            }
            
            projectsGrid.innerHTML = html;
        }
        
        function renderPagination() {
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let html = '';
            html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
            
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            
            html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
            
            paginationDiv.innerHTML = html;
        }
        
        window.changePage = function(page) {
            if (page < 1 || page > totalPages || isLoading) return;
            currentPage = page;
            loadProjects();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        versionFilter.addEventListener('change', () => {
            currentPage = 1;
            loadProjects();
        });
        
        loaderFilter.addEventListener('change', () => {
            currentPage = 1;
            loadProjects();
        });
        
        sortFilter.addEventListener('change', () => {
            currentPage = 1;
            loadProjects();
        });
        
        loadProjects();
    </script>
</body>
</html>
