            --bg-selected: #3b3b45;

            --text-brand: #fbbf24;

            --color-forge: #959eef;

        /* Боковая панель */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.5rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-button) var(--bg-body);
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-body);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--bg-button);
            border-radius: 4px;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.5rem;
        }

        .sidebar-category-title {
            padding: 0.5rem 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-item {

            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);

            border-radius: 2rem;
            color: var(--text-contrast);

        .google-btn:hover {

            color: var(--text-secondary);
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);

        .error {

        .project-header {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            position: relative;

        .project-icon {
            width: 100px;
            height: 100px;
            border-radius: 1rem;
            background-color: var(--bg-button);
            object-fit: cover;

        .project-info {

            display: flex;
            flex-direction: column;
        }

        .btn-wrapper {

            --_height: 2.25rem;
            --_width: 2.25rem;
            --_radius: 0.75rem;
            --_padding-x: calc(0.5rem - 0.125rem);
            --_padding-y: 0.5rem;
            --_gap: 0.375rem;
            --_font-weight: 600;
            --_icon-size: 1.25rem;

            border-radius: var(--_radius);
            height: var(--_height);
            width: var(--_width);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            color: var(--_text);
            font-weight: var(--_font-weight);
            gap: var(--_gap);
            padding: var(--_padding-y) var(--_padding-x);

        .btn-wrapper:hover {
            background: var(--_hover-bg);
            color: var(--_hover-text);
        }

        .btn-wrapper.text-base {
            font-size: 0.95rem;

            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--_gap);
            width: 100%;
            height: 100%;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;

            margin-bottom: 1rem;

            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);

        .stat-item svg {

            height: 1.3rem;

            fill: none;

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-contrast);

        .stat-label {
            font-size: 0.85rem;
        }

        .project-description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .gallery-section {
            margin-bottom: 2rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .gallery-image {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border-subtle);
        }

        .gallery-image:hover {
            transform: scale(1.02);
            border-color: var(--text-brand);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 2rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
        }

        .project-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .detail-section {
            background-color: var(--bg-raised);
            padding: 1.2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-contrast);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .info-grid strong {
            color: var(--text-contrast);
            font-weight: 600;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 9999px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .link-item:hover {
            background-color: var(--bg-button);
            color: var(--text-brand);
        }

        .link-item svg {
            width: 1.1rem;
            height: 1.1rem;
            stroke: currentColor;
        }

<body>
    <div class="modal" id="galleryModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyBk4nxZ1ldNQUCxsbgaeYTkm9stq0o9o2Q",
            authDomain: "deygram-e4814.firebaseapp.com",
            projectId: "deygram-e4814",
            storageBucket: "deygram-e4814.firebasestorage.app",
            messagingSenderId: "591207353726",
            appId: "1:591207353726:web:d20f5e648d3daf86fcb72f"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========== НАСТРОЙКИ ==========
        const API_BASE = 'https://api.modrinth.com/v2';
        const TRANSLATE_API = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=';

        // ========== ПОЛУЧАЕМ SLUG ИЗ URL ==========
        function getProjectInfoFromUrl() {
            const hash = window.location.hash.substring(1);
            const parts = hash.split('/');
            
            if (parts.length >= 2) {
                return {
                    type: parts[0],
                    slug: parts[1]
                };
            }
            return null;
        }

        const projectInfo = getProjectInfoFromUrl();
        const projectContent = document.getElementById('projectContent');
        
        if (!projectInfo) {
            projectContent.innerHTML = `
                <div class="error">
                    ❌ Не указан проект<br>
                    <button onclick="window.location.href='/minecraft/'" style="color: var(--text-brand); margin-top: 1rem; padding: 0.5rem 1rem; background: none; border: 1px solid var(--text-brand); border-radius: 0.5rem; cursor: pointer;">Вернуться на главную</button>
                </div>
            `;
        }

        const projectType = projectInfo.type;
        const projectSlug = projectInfo.slug;

        // Состояние
        let projectData = null;
        let allVersions = [];
        let filteredVersions = [];
        let cachedTranslations = new Map();
        let translateEnabled = true;
        let selectedLoader = null;
        const VERSIONS_PER_PAGE = 10;
        let currentPage = 1;
        let availableLoaders = [];
        let currentUser = null;
        let savedProjects = new Set();

        // Элементы
        const savedBtn = document.getElementById('savedBtn');
        const messengerBtn = document.getElementById('messengerBtn');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userNick = document.getElementById('userNick');
        const userAvatar = document.getElementById('userAvatar');

        // Open Graph метатеги
        const ogTitle = document.getElementById('og-title');
        const ogDescription = document.getElementById('og-description');
        const ogImage = document.getElementById('og-image');
        const ogUrl = document.getElementById('og-url');

        // ========== АУТЕНТИФИКАЦИЯ ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                userInfo.style.display = 'block';
                googleSignInBtn.style.display = 'none';
                
                userName.textContent = user.displayName || 'Пользователь';
                const nick = `@${user.email.split('@')[0]}_${Math.floor(Math.random() * 10000)}`;
                userNick.textContent = nick;
                userAvatar.textContent = (user.displayName || 'U')[0].toUpperCase();
                
                // Загружаем сохраненные проекты
                await loadSavedProjects();
                
                // Проверяем, сохранен ли текущий проект
                if (projectData) {
                    checkIfSaved();
                }
            } else {
                currentUser = null;
                userInfo.style.display = 'none';
                googleSignInBtn.style.display = 'flex';
                savedProjects.clear();
            }
        });

        googleSignInBtn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        });

        savedBtn.addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы увидеть сохраненные проекты');
                return;
            }
            window.location.href = '/minecraft/saved.html';
        });

        messengerBtn.addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы использовать мессенджер');
                return;
            }
            window.location.href = '/minecraft/messenger.html';
        });

        document.querySelectorAll('.sidebar-item[data-type]').forEach(btn => {
            btn.addEventListener('click', () => {
                window.location.href = `/minecraft/search.html?type=${btn.dataset.type}`;
            });
        });

        // ========== СОХРАНЕННЫЕ ПРОЕКТЫ ==========
        async function loadSavedProjects() {
            if (!currentUser) return;
            
            try {
                const savedRef = db.collection('saved').doc(currentUser.uid);
                const doc = await savedRef.get();
                
                if (doc.exists) {
                    savedProjects = new Set(doc.data().projects || []);
                }
            } catch (error) {
                console.error('Ошибка загрузки сохраненных:', error);
            }
        }

        async function getProjectsData() {
            const savedRef = db.collection('saved').doc(currentUser.uid);
            const doc = await savedRef.get();
            return doc.exists ? doc.data().projectsData || {} : {};
        }

        async function toggleSave() {
            if (!currentUser) {
                alert('Войдите, чтобы сохранять проекты');
                return;
            }

            const btn = document.getElementById('saveProjectBtn');
            const isSaved = savedProjects.has(projectSlug);
            
            try {
                const savedRef = db.collection('saved').doc(currentUser.uid);
                
                if (!isSaved) {
                    savedProjects.add(projectSlug);
                    btn.classList.add('saved');
                    
                    // Сохраняем данные проекта
                    const projectsData = await getProjectsData();
                    projectsData[projectSlug] = {
                        title: projectData.title,
                        type: projectType,
                        slug: projectSlug,
                        icon: projectData.icon_url,
                        author: projectData.author,
                        description: projectData.description
                    };
                    
                    await savedRef.set({
                        projects: Array.from(savedProjects),
                        projectsData: projectsData
                    }, { merge: true });
                    
                    showNotification('Проект сохранен!');
                } else {
                    savedProjects.delete(projectSlug);
                    btn.classList.remove('saved');
                    
                    await savedRef.set({
                        projects: Array.from(savedProjects)
                    }, { merge: true });
                    
                    showNotification('Проект удален из сохраненных');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при сохранении');
            }
        }

        function checkIfSaved() {
            const btn = document.getElementById('saveProjectBtn');
            if (btn && savedProjects.has(projectSlug)) {
                btn.classList.add('saved');
            }
        }

        function showNotification(message) {
            alert(message);
        }

        // ========== ПОДЕЛИТЬСЯ ==========
        function showShareModal() {
            document.getElementById('shareModal').classList.add('show');
        }

        function copyShareLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('Ссылка скопирована!');
                document.getElementById('shareModal').classList.remove('show');
            });
        }

        function shareInMessenger() {
            if (!currentUser) {
                alert('Войдите, чтобы поделиться в чате');
                return;
            }
            
            // Сохраняем информацию о шаре в localStorage для мессенджера
            const shareData = {
                type: 'project',
                projectType: projectType,
                projectSlug: projectSlug,
                title: projectData.title,
                icon: projectData.icon_url,
                timestamp: Date.now()
            };
            
            localStorage.setItem('pendingShare', JSON.stringify(shareData));
            window.location.href = '/minecraft/messenger.html';
        }

        // ========== ПЕРЕВОД ==========
        async function translateText(text) {
            if (!text || text.length < 20) return text;
            if (cachedTranslations.has(text)) return cachedTranslations.get(text);
            
            try {
                const response = await fetch(TRANSLATE_API + encodeURIComponent(text));
                const data = await response.json();
                const translated = data[0][0][0];
                cachedTranslations.set(text, translated);
                return translated;
            } catch (error) {
                console.warn('Ошибка перевода:', error);
                return text;
            }
        }

        // ========== ФУНКЦИЯ ДЛЯ ГАЛЕРЕИ ==========
        window.openModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('galleryModal').classList.add('show');
        };

        window.closeModal = function() {
            document.getElementById('galleryModal').classList.remove('show');
        };

        // ========== ФУНКЦИЯ ДЛЯ ПРОКРУТКИ К ВЕРСИЯМ ==========
        window.scrollToVersions = function() {
            document.getElementById('versions-section').scrollIntoView({ behavior: 'smooth' });
        };

        // ========== ФУНКЦИЯ ДЛЯ ВЫБОРА ЗАГРУЗЧИКА ==========
        window.toggleLoader = function(loader) {
            if (selectedLoader === loader) {
                selectedLoader = null;
            } else {
                selectedLoader = loader;
            }
            currentPage = 1;
            applyFilters();
            renderProject();
        };

        // ========== ФУНКЦИЯ ДЛЯ ПАГИНАЦИИ ==========
        window.goToPage = function(page) {
            currentPage = page;
            renderProject();
        };

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        async function loadProject() {
            try {
                projectContent.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
                
                // Загружаем основную информацию
                const projectResponse = await fetch(`${API_BASE}/project/${projectSlug}`);
                if (!projectResponse.ok) throw new Error('Проект не найден');
                projectData = await projectResponse.json();

                // Обновляем Open Graph метатеги
                ogTitle.setAttribute('content', projectData.title);
                ogDescription.setAttribute('content', projectData.description || 'Просмотр проекта на Modrinth');
                ogImage.setAttribute('content', projectData.icon_url || 'https://via.placeholder.com/512/2c2c30/a0a0a8?text=Mod');
                ogUrl.setAttribute('content', window.location.href);

                // Загружаем все версии
                const versionsResponse = await fetch(`${API_BASE}/project/${projectSlug}/version`);
                allVersions = await versionsResponse.json();

                // Получаем уникальные загрузчики
                const loadersSet = new Set();
                allVersions.forEach(version => {
                    version.loaders.forEach(loader => loadersSet.add(loader));
                });
                availableLoaders = Array.from(loadersSet).sort();

                // Переводим описание
                if (projectData.description) {
                    projectContent.innerHTML = '<div class="loading">🔄 Переводим описание...</div>';
                    await translateText(projectData.description);
                }

                // Применяем фильтры
                applyFilters();

                // Отображаем
                renderProject();

            } catch (error) {
                console.error('Ошибка:', error);
                projectContent.innerHTML = `
                    <div class="error">
                        ❌ Ошибка: ${error.message}<br>
                        <button onclick="window.location.href='/minecraft/'" style="color: var(--text-brand); margin-top: 1rem; padding: 0.5rem 1rem; background: none; border: 1px solid var(--text-brand); border-radius: 0.5rem; cursor: pointer;">Вернуться на главную</button>
                    </div>
                `;
            }
        }

        // ========== ПРИМЕНЕНИЕ ФИЛЬТРОВ ==========
        function applyFilters() {
            filteredVersions = allVersions.filter(version => {
                if (selectedLoader && !version.loaders.includes(selectedLoader)) {
                    return false;
                }
                return true;
            });
        }

        // ========== ФОРМАТИРОВАНИЕ ЧИСЕЛ ==========
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
            if (num >= 1_000) return (num / 1_000).toFixed(1) + 'k';
            return num.toString();
        }

        // ========== ФОРМАТИРОВАНИЕ ДАТЫ ==========
        function formatRelativeDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 7) {
                return `${diffDays} ${getDaysWord(diffDays)} назад`;
            } else if (diffDays < 30) {
                const weeks = Math.floor(diffDays / 7);
                return `${weeks} ${getWeeksWord(weeks)} назад`;
            } else if (diffDays < 365) {
                const months = Math.floor(diffDays / 30);
                return `${months} ${getMonthsWord(months)} назад`;
            } else {
                const years = Math.floor(diffDays / 365);
                return `${years} ${getYearsWord(years)} назад`;
            }
        }

        function getDaysWord(days) {
            if (days === 1) return 'день';
            if (days >= 2 && days <= 4) return 'дня';
            return 'дней';
        }

        function getWeeksWord(weeks) {
            if (weeks === 1) return 'неделю';
            if (weeks >= 2 && weeks <= 4) return 'недели';
            return 'недель';
        }

        function getMonthsWord(months) {
            if (months === 1) return 'месяц';
            if (months >= 2 && months <= 4) return 'месяца';
            return 'месяцев';
        }

        function getYearsWord(years) {
            if (years === 1) return 'год';
            if (years >= 2 && years <= 4) return 'года';
            return 'лет';
        }

        // ========== ОПРЕДЕЛЕНИЕ СТАТУСА ВЕРСИИ ==========
        function getVersionStatus(version) {
            const versionStr = version.version_number.toLowerCase();
            const gameVersions = version.game_versions.join(' ').toLowerCase();
            
            if (versionStr.includes('beta') || versionStr.includes('pre') || 
                gameVersions.includes('beta') || gameVersions.includes('pre') ||
                gameVersions.includes('snapshot') || gameVersions.includes('w')) {
                return { type: 'beta', letter: 'B' };
            }
            return { type: 'release', letter: 'R' };
        }

        // ========== ПОЛУЧЕНИЕ ОПИСАНИЯ ==========
        function getDescription() {
            if (!projectData || !projectData.description) return 'Нет описания';
            const cached = cachedTranslations.get(projectData.description);
            return cached || projectData.description;
        }

        // ========== ПОЛУЧЕНИЕ ЦВЕТА ЗАГРУЗЧИКА ==========
        function getLoaderClass(loader) {
            switch(loader.toLowerCase()) {
                case 'fabric': return 'fabric';
                case 'forge': return 'forge';
                case 'neoforge': return 'neoforge';
                case 'quilt': return 'quilt';
                default: return '';
            }
        }

        // ========== ОТРИСОВКА ==========
        function renderProject() {
            const iconUrl = projectData.icon_url || 'https://via.placeholder.com/128/2c2c30/a0a0a8?text=Mod';
            
            // Получаем ссылки
            const links = [];
            if (projectData.source_url) links.push({ type: 'source', url: projectData.source_url, name: 'Исходный код' });
            if (projectData.issues_url) links.push({ type: 'issues', url: projectData.issues_url, name: 'Сообщить о проблеме' });
            if (projectData.wiki_url) links.push({ type: 'wiki', url: projectData.wiki_url, name: 'Wiki' });
            if (projectData.discord_url) links.push({ type: 'discord', url: projectData.discord_url, name: 'Discord' });

            const description = getDescription();

            // Формируем фильтры загрузчиков
            const loaderFilters = `
                <div class="loader-badges">
                    ${availableLoaders.map(loader => `
                        <span class="loader-badge-filter ${getLoaderClass(loader)} ${selectedLoader === loader ? 'active' : ''}" 
                              data-loader="${loader}" onclick="toggleLoader('${loader}')">${loader}</span>
                    `).join('')}
                </div>
            `;

            // Пагинация
            const totalPages = Math.ceil(filteredVersions.length / VERSIONS_PER_PAGE);
            const startIndex = (currentPage - 1) * VERSIONS_PER_PAGE;
            const endIndex = Math.min(startIndex + VERSIONS_PER_PAGE, filteredVersions.length);
            const paginatedVersions = filteredVersions.slice(startIndex, endIndex);

            // Формируем кнопки пагинации
            let paginationButtons = '';
            if (totalPages > 1) {
                paginationButtons += '<div class="flex mt-3"><div class="flex items-center gap-1 ml-auto">';
                
                paginationButtons += `
                    <div class="page-number-container">
                        <div class="btn-wrapper text-base" style="--_bg: transparent; --_text: var(--color-base); --_hover-bg: var(--color-button-bg); --_hover-text: var(--color-base); --_box-shadow: none; --_height: 2.25rem; --_width: 2.25rem; --_radius: 99999px;">

                        </div>
                    </div>

                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, currentPage + 2);
                
                for (let i = startPage; i <= endPage; i++) {
                    paginationButtons += `
                        <div class="page-number-container">

                if (endPage < totalPages) {

                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                } else if (diffDays < 30) {

                    dateText = `${weeks} ${getWeeksWord(weeks)} назад`;
                } else if (diffDays < 365) {

                    dateText = `${months} ${getMonthsWord(months)} назад`;

                                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2"></path>

                                <a href="${version.files[0]?.url}" target="_blank" class="hover:!bg-button-bg" aria-label="Download">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1m-4-4-4 4m0 0-4-4m4 4V4"></path>

                                        <circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    ${index < paginatedVersions.length - 1 ? '<div class="versions-grid-row h-px w-full bg-surface-5"></div>' : ''}
                `;
            });

            // Проверяем, сохранен ли проект
            const isSaved = savedProjects.has(projectSlug);

            let html = `
                <div class="project-header">
                    <img src="${iconUrl}" class="project-icon" alt="${escapeHtml(projectData.title)}"
                         onerror="this.src='https://via.placeholder.com/128/2c2c30/a0a0a8?text=Mod'">
                    <div class="project-info">
                        <div class="project-name-row">
                            <h1 class="project-name">${escapeHtml(projectData.title)}</h1>
                            <div class="action-buttons">

                                    <button id="saveProjectBtn" onclick="toggleSave()" class="${isSaved ? 'saved' : ''}">
                                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>

                                        Скачать
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="project-author">by ${escapeHtml(projectData.author || 'Неизвестен')}</div>
                        <div class="project-stats">
                            <div class="stat-item">
                                <svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1m-4-4-4 4m0 0-4-4m4 4V4"/></svg>
                                <div>
                                    <div class="stat-value">${formatNumber(projectData.downloads)}</div>
                                    <div class="stat-label">скачиваний</div>
                                </div>
                            </div>
                            <div class="stat-item">
                                <svg viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2"/></svg>
                                <div>
                                    <div class="stat-value">${formatRelativeDate(projectData.updated)}</div>
                                    <div class="stat-label">обновлено</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="project-description">
                    ${escapeHtml(description)}
                </div>

                ${projectData.gallery && projectData.gallery.length > 0 ? `
                    <div class="gallery-section">
                        <h3 class="section-title">🖼️ Галерея</h3>
                        <div class="gallery">
                            ${projectData.gallery.map(img => `
                                <img src="${img.url}" class="gallery-image" onclick="openModal('${img.url}')">

                            <div><strong>Сторона клиента:</strong> ${escapeHtml(projectData.client_side || 'Неизвестно')}</div>
                            <div><strong>Сторона сервера:</strong> ${escapeHtml(projectData.server_side || 'Неизвестно')}</div>
                            <div><strong>Дата создания:</strong> ${formatRelativeDate(projectData.published)}</div>

                                <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                Страница на Modrinth
                            </a>

                                <a href="${escapeHtml(link.url)}" target="_blank" class="link-item">
                                    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
                                    ${escapeHtml(link.name)}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="versions-section" id="versions-section">
                    <div class="versions-header">
                        <h3 class="versions-title">📥 Версии</h3>
                        ${loaderFilters}

                    <div class="normal-page__content">

                                <a class="button-animation z-[1] flex flex-row items-center gap-2 px-4 py-2 focus:rounded-full">
                                    <span class="text-nowrap text-contrast">Description</span>
                                </a>
                                <a class="button-animation z-[1] flex flex-row items-center gap-2 px-4 py-2 focus:rounded-full">

                                                    Game versions
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" d="m19 9-7 7-7-7"></path></svg>

                                            </div>
                                            <div class="btn-wrapper text-base" style="--_bg: var(--color-button-bg); --_text: var(--color-base); --_hover-bg: var(--color-button-bg); --_hover-text: var(--color-base); --_box-shadow: var(--shadow-button); --_height: 2.25rem; --_width: auto; --_radius: 0.75rem; --_padding-x: calc(0.75rem - 0.125rem); --_padding-y: 0.5rem; --_gap: 0.375rem; --_font-weight: 600; --_icon-size: 1.25rem;">
                                                <button>
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54z"></path></svg>
                                                    Channels
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-width="2" d="m19 9-7 7-7-7"></path></svg>
                                                </button>
                                            </div>

                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-4 rounded-2xl bg-bg-raised px-6 pb-8 pt-4 supports-[grid-template-columns:subgrid]:grid supports-[grid-template-columns:subgrid]:grid-cols-[1fr_min-content] sm:px-8 supports-[grid-template-columns:subgrid]:sm:grid-cols-[min-content_auto_auto_auto_min-content] supports-[grid-template-columns:subgrid]:xl:grid-cols-[min-content_auto_auto_auto_auto_auto_min-content] no-environment">
                                <div class="versions-grid-row">
                                    <div class="w-9 max-sm:hidden"></div>

                                    <div class="text-sm font-bold text-contrast max-sm:hidden sm:max-xl:collapse sm:max-xl:hidden">Platforms</div>
                                    <div class="text-sm font-bold text-contrast max-sm:hidden sm:max-xl:collapse sm:max-xl:hidden">Published</div>
                                    <div class="text-sm font-bold text-contrast max-sm:hidden sm:max-xl:collapse sm:max-xl:hidden">Downloads</div>
                                    <div class="text-sm font-bold text-contrast max-sm:hidden xl:collapse xl:hidden">Compatibility</div>
                                    <div class="text-sm font-bold text-contrast max-sm:hidden xl:collapse xl:hidden">Stats</div>

                            </div>
                            
                            ${paginationButtons}
                        </section>
                    </div>
                </div>
            `;

            projectContent.innerHTML = html;
        }

        // ========== ЗАЩИТА ОТ XSS ==========
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ========== СЛЕДИМ ЗА ИЗМЕНЕНИЕМ HASH ==========
        window.addEventListener('hashchange', () => {
            window.location.reload();
        });

        // Закрытие модального окна по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                document.getElementById('shareModal').classList.remove('show');
            }
        });

        // Запуск
        if (projectInfo) {
            loadProject();
        }
    </script>
</body>
</html>
