<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Мод</title>
    <!-- Open Graph метатеги для предпросмотра в соцсетях -->
    <meta property="og:title" content="Deynik Minecraft - Мод" id="og-title">
    <meta property="og:description" content="Просмотр мода на Modrinth" id="og-description">
    <meta property="og:image" content="" id="og-image">
    <meta property="og:url" content="" id="og-url">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1600px;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            
            --color-fabric: #dbb69b;
            --color-fabric-alpha: rgba(219, 182, 155, 0.3);
            --color-forge: #959eef;
            --color-forge-alpha: rgba(149, 158, 239, 0.3);
            --color-neoforge: #f99e6b;
            --color-neoforge-alpha: rgba(249, 158, 107, 0.3);
            --color-quilt: #c796f9;
            --color-quilt-alpha: rgba(199, 150, 249, 0.3);
            
            --color-release: #2bde73;
            --color-beta: #fbbf24;
        }

        /* Боковая панель */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.5rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-button) var(--bg-body);
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-body);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--bg-button);
            border-radius: 4px;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.5rem;
        }

        .sidebar-category-title {
            padding: 0.5rem 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            background-color: var(--bg-button);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            color: var(--text-contrast);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .user-nick {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .google-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .google-btn svg {
            width: 1.1rem;
            height: 1.1rem;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 1rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            background-color: var(--bg-raised);
            padding: 0.75rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            color: var(--text-brand);
        }

        .back-btn svg {
            width: 1.2rem;
            height: 1.2rem;
            stroke: currentColor;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-contrast);
            cursor: pointer;
        }

        .logo span {
            color: var(--text-brand);
        }

        .loading, .error {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .error {
            color: #ef4444;
        }

        .project-header {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            position: relative;
        }

        .project-icon {
            width: 100px;
            height: 100px;
            border-radius: 1rem;
            background-color: var(--bg-button);
            object-fit: cover;
        }

        .project-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.5rem;
            width: 100%;
            flex-wrap: wrap;
        }

        .project-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-contrast);
            line-height: 1.2;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            height: 38px;
        }

        .action-btn:hover {
            background-color: var(--bg-button-hover);
            color: var(--text-contrast);
            border-color: var(--text-brand);
        }

        .action-btn.saved {
            background-color: var(--text-brand);
            color: var(--bg-body);
            border-color: var(--text-brand);
        }

        .action-btn.saved:hover {
            background-color: #fbbf24;
        }

        .action-btn.share-btn {
            width: 38px;
            padding: 0.5rem;
        }

        .action-btn svg {
            width: 1.1rem;
            height: 1.1rem;
            stroke: currentColor;
        }

        .project-author {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .project-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-item svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            fill: none;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-contrast);
        }

        .stat-label {
            font-size: 0.85rem;
        }

        .project-description {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .gallery-section {
            margin-bottom: 2rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .gallery-image {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border-subtle);
        }

        .gallery-image:hover {
            transform: scale(1.02);
            border-color: var(--text-brand);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 2rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
        }

        .project-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .detail-section {
            background-color: var(--bg-raised);
            padding: 1.2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-contrast);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .info-grid strong {
            color: var(--text-contrast);
            font-weight: 600;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 9999px;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .link-item:hover {
            background-color: var(--bg-button);
            color: var(--text-brand);
        }

        .link-item svg {
            width: 1.1rem;
            height: 1.1rem;
            stroke: currentColor;
        }

        /* Секция версий - ПРОСТАЯ И ПОНЯТНАЯ */
        .versions-section {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .versions-header {
            padding: 1.2rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .versions-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-contrast);
            margin-bottom: 1rem;
        }

        .loader-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .loader-badge-filter {
            padding: 0.3rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .loader-badge-filter:hover {
            filter: brightness(1.2);
        }

        .loader-badge-filter.active {
            border-color: var(--text-brand);
            box-shadow: 0 0 0 1px var(--text-brand);
        }

        .loader-badge-filter[data-loader="fabric"] {
            background-color: var(--color-fabric);
            color: #000;
        }

        .loader-badge-filter[data-loader="forge"] {
            background-color: var(--color-forge);
            color: #000;
        }

        .loader-badge-filter[data-loader="neoforge"] {
            background-color: var(--color-neoforge);
            color: #000;
        }

        .loader-badge-filter[data-loader="quilt"] {
            background-color: var(--color-quilt);
            color: #000;
        }

        /* Простая таблица версий */
        .versions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .versions-table th {
            text-align: left;
            padding: 1rem 1.2rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-subtle);
            background-color: rgba(0, 0, 0, 0.2);
        }

        .versions-table td {
            padding: 1rem 1.2rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
        }

        .versions-table tr:hover td {
            background-color: var(--bg-button);
        }

        .version-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .version-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .version-status.release {
            background-color: var(--color-release);
            color: #000;
        }

        .version-status.beta {
            background-color: var(--color-beta);
            color: #000;
        }

        .version-number {
            font-weight: 600;
            color: var(--text-contrast);
            font-size: 0.95rem;
        }

        .loader-badge-table {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-right: 0.2rem;
            margin-bottom: 0.2rem;
            color: #000;
        }

        .loader-badge-table.fabric {
            background-color: var(--color-fabric-alpha);
        }

        .loader-badge-table.forge {
            background-color: var(--color-forge-alpha);
        }

        .loader-badge-table.neoforge {
            background-color: var(--color-neoforge-alpha);
        }

        .loader-badge-table.quilt {
            background-color: var(--color-quilt-alpha);
        }

        .game-versions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .game-version {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 0.25rem;
            padding: 0.1rem 0.3rem;
            font-size: 0.7rem;
            color: var(--text-primary);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background-color: var(--bg-brand);
            color: var(--text-brand);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            font-size: 0.85rem;
        }

        .download-btn:hover {
            background-color: var(--text-brand);
            color: var(--bg-body);
        }

        .download-btn svg {
            width: 0.9rem;
            height: 0.9rem;
            stroke: currentColor;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.2rem;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 2.2rem;
            height: 2.2rem;
            border-radius: 0.5rem;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.1s;
            padding: 0 0.5rem;
            font-size: 0.9rem;
        }

        .page-btn:hover:not(:disabled) {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .page-btn.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
            border-color: var(--text-brand);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-versions {
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .versions-table th,
            .versions-table td {
                padding: 0.75rem 0.5rem;
                font-size: 0.8rem;
            }
            
            .version-status {
                width: 20px;
                height: 20px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="modal" id="galleryModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <!-- Модальное окно для поделиться -->
    <div class="modal" id="shareModal">
        <div class="modal-content" style="max-width: 400px; padding: 2rem; background: var(--bg-raised); border-radius: 1rem;">
            <span class="modal-close" onclick="document.getElementById('shareModal').classList.remove('show')">&times;</span>
            <h3 style="color: var(--text-contrast); margin-bottom: 1.5rem; font-size: 1.3rem;">Поделиться</h3>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <button class="action-btn" style="width: 100%; justify-content: center;" onclick="copyShareLink()">
                    <i class="fas fa-copy"></i> Копировать ссылку
                </button>
                <button class="action-btn" style="width: 100%; justify-content: center;" onclick="shareInMessenger()">
                    <i class="fas fa-comment"></i> Отправить в чат
                </button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='/minecraft/'">Deynik <span>Minecraft</span></div>
            
            <!-- Категория 1: Главное -->
            <div class="sidebar-category">
                <div class="sidebar-category-title">Главное</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/'">
                        <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9z"/><path d="M9 21v-6h6v6"/></svg>
                        Рекомендации
                    </button>
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/search.html'">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Поиск
                    </button>
                    <button class="sidebar-item" id="savedBtn">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Сохраненные
                    </button>
                    <button class="sidebar-item" id="messengerBtn">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Мессенджер
                    </button>
                </div>
            </div>

            <!-- Категория 2: Контент -->
            <div class="sidebar-category">
                <div class="sidebar-category-title">Контент</div>
                <div class="sidebar-menu">

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyBk4nxZ1ldNQUCxsbgaeYTkm9stq0o9o2Q",
            authDomain: "deygram-e4814.firebaseapp.com",
            projectId: "deygram-e4814",
            storageBucket: "deygram-e4814.firebasestorage.app",
            messagingSenderId: "591207353726",
            appId: "1:591207353726:web:d20f5e648d3daf86fcb72f"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========== НАСТРОЙКИ ==========
        const API_BASE = 'https://api.modrinth.com/v2';
        const TRANSLATE_API = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=';

        // ========== ПОЛУЧАЕМ SLUG ИЗ URL ==========
        function getProjectInfoFromUrl() {
            const hash = window.location.hash.substring(1);
            const parts = hash.split('/');
            
            if (parts.length >= 2) {
                return {
                    type: parts[0],
                    slug: parts[1]
                };
            }
            return null;
        }

        const projectInfo = getProjectInfoFromUrl();
        const projectContent = document.getElementById('projectContent');
        
        if (!projectInfo) {
            projectContent.innerHTML = `
                <div class="error">
                    ❌ Не указан проект<br>
                    <button onclick="window.location.href='/minecraft/'" style="color: var(--text-brand); margin-top: 1rem; padding: 0.5rem 1rem; background: none; border: 1px solid var(--text-brand); border-radius: 0.5rem; cursor: pointer;">Вернуться на главную</button>
                </div>
            `;
        }

        const projectType = projectInfo.type;
        const projectSlug = projectInfo.slug;

        // Состояние
        let projectData = null;
        let allVersions = [];
        let filteredVersions = [];
        let cachedTranslations = new Map();
        let translateEnabled = true;
        let selectedLoader = null;
        const VERSIONS_PER_PAGE = 10;
        let currentPage = 1;
        let availableLoaders = [];
        let currentUser = null;
        let savedProjects = new Set();

        // Элементы
        const savedBtn = document.getElementById('savedBtn');
        const messengerBtn = document.getElementById('messengerBtn');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userNick = document.getElementById('userNick');
        const userAvatar = document.getElementById('userAvatar');

        // Open Graph метатеги
        const ogTitle = document.getElementById('og-title');
        const ogDescription = document.getElementById('og-description');
        const ogImage = document.getElementById('og-image');
        const ogUrl = document.getElementById('og-url');

        // ========== АУТЕНТИФИКАЦИЯ ==========
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                userInfo.style.display = 'block';
                googleSignInBtn.style.display = 'none';
                
                userName.textContent = user.displayName || 'Пользователь';
                const nick = `@${user.email.split('@')[0]}_${Math.floor(Math.random() * 10000)}`;
                userNick.textContent = nick;
                userAvatar.textContent = (user.displayName || 'U')[0].toUpperCase();
                
                // Загружаем сохраненные проекты
                await loadSavedProjects();
                
                // Проверяем, сохранен ли текущий проект
                if (projectData) {
                    checkIfSaved();
                }
            } else {
                currentUser = null;
                userInfo.style.display = 'none';
                googleSignInBtn.style.display = 'flex';
                savedProjects.clear();
            }
        });

        googleSignInBtn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        });

        savedBtn.addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы увидеть сохраненные проекты');
                return;
            }
            window.location.href = '/minecraft/saved.html';
        });

        messengerBtn.addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы использовать мессенджер');
                return;
            }
            window.location.href = '/minecraft/messenger.html';
        });

        document.querySelectorAll('.sidebar-item[data-type]').forEach(btn => {
            btn.addEventListener('click', () => {
                window.location.href = `/minecraft/search.html?type=${btn.dataset.type}`;
            });
        });

        // ========== СОХРАНЕННЫЕ ПРОЕКТЫ ==========
        async function loadSavedProjects() {
            if (!currentUser) return;
            
            try {
                const savedRef = db.collection('saved').doc(currentUser.uid);
                const doc = await savedRef.get();
                
                if (doc.exists) {
                    savedProjects = new Set(doc.data().projects || []);
                }
            } catch (error) {
                console.error('Ошибка загрузки сохраненных:', error);
            }
        }

        async function getProjectsData() {
            const savedRef = db.collection('saved').doc(currentUser.uid);
            const doc = await savedRef.get();
            return doc.exists ? doc.data().projectsData || {} : {};
        }

        async function toggleSave() {
            if (!currentUser) {
                alert('Войдите, чтобы сохранять проекты');
                return;
            }

            const btn = document.getElementById('saveProjectBtn');
            const isSaved = savedProjects.has(projectSlug);
            
            try {
                const savedRef = db.collection('saved').doc(currentUser.uid);
                
                if (!isSaved) {
                    savedProjects.add(projectSlug);
                    btn.classList.add('saved');
                    
                    // Сохраняем данные проекта
                    const projectsData = await getProjectsData();
                    projectsData[projectSlug] = {
                        title: projectData.title,
                        type: projectType,
                        slug: projectSlug,
                        icon: projectData.icon_url,
                        author: projectData.author,
                        description: projectData.description
                    };
                    
                    await savedRef.set({
                        projects: Array.from(savedProjects),
                        projectsData: projectsData
                    }, { merge: true });
                    
                    showNotification('Проект сохранен!');
                } else {
                    savedProjects.delete(projectSlug);
                    btn.classList.remove('saved');
                    
                    await savedRef.set({
                        projects: Array.from(savedProjects)
                    }, { merge: true });
                    
                    showNotification('Проект удален из сохраненных');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при сохранении');
            }
        }

        function checkIfSaved() {
            const btn = document.getElementById('saveProjectBtn');
            if (btn && savedProjects.has(projectSlug)) {
                btn.classList.add('saved');
            }
        }

        function showNotification(message) {
            alert(message);
        }

        // ========== ПОДЕЛИТЬСЯ ==========
        function showShareModal() {
            document.getElementById('shareModal').classList.add('show');
        }

        function copyShareLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('Ссылка скопирована!');
                document.getElementById('shareModal').classList.remove('show');
            });
        }

        function shareInMessenger() {
            if (!currentUser) {
                alert('Войдите, чтобы поделиться в чате');
                return;
            }
            
            // Сохраняем информацию о шаре в localStorage для мессенджера
            const shareData = {
                type: 'project',
                projectType: projectType,
                projectSlug: projectSlug,
                title: projectData.title,
                icon: projectData.icon_url,
                timestamp: Date.now()
            };
            
            localStorage.setItem('pendingShare', JSON.stringify(shareData));
            window.location.href = '/minecraft/messenger.html';
        }

        // ========== ПЕРЕВОД ==========
        async function translateText(text) {
            if (!text || text.length < 20) return text;
            if (cachedTranslations.has(text)) return cachedTranslations.get(text);
            
            try {
                const response = await fetch(TRANSLATE_API + encodeURIComponent(text));
                const data = await response.json();
                const translated = data[0][0][0];
                cachedTranslations.set(text, translated);
                return translated;
            } catch (error) {
                console.warn('Ошибка перевода:', error);
                return text;
            }
        }

        // ========== ФУНКЦИЯ ДЛЯ ГАЛЕРЕИ ==========
        window.openModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('galleryModal').classList.add('show');
        };

        window.closeModal = function() {
            document.getElementById('galleryModal').classList.remove('show');
        };

        // ========== ФУНКЦИЯ ДЛЯ ПРОКРУТКИ К ВЕРСИЯМ ==========
        window.scrollToVersions = function() {
            document.getElementById('versions-section').scrollIntoView({ behavior: 'smooth' });
        };

        // ========== ФУНКЦИЯ ДЛЯ ВЫБОРА ЗАГРУЗЧИКА ==========
        window.toggleLoader = function(loader) {
            if (selectedLoader === loader) {
                selectedLoader = null;
            } else {
                selectedLoader = loader;
            }
            currentPage = 1;
            applyFilters();
            renderProject();
        };

        // ========== ФУНКЦИЯ ДЛЯ ПАГИНАЦИИ ==========
        window.goToPage = function(page) {
            currentPage = page;
            renderProject();
        };

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        async function loadProject() {
            try {
                projectContent.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
                
                // Загружаем основную информацию
                const projectResponse = await fetch(`${API_BASE}/project/${projectSlug}`);
                if (!projectResponse.ok) throw new Error('Проект не найден');
                projectData = await projectResponse.json();

                // Обновляем Open Graph метатеги
                ogTitle.setAttribute('content', projectData.title);
                ogDescription.setAttribute('content', projectData.description || 'Просмотр проекта на Modrinth');
                ogImage.setAttribute('content', projectData.icon_url || 'https://via.placeholder.com/512/2c2c30/a0a0a8?text=Mod');
                ogUrl.setAttribute('content', window.location.href);

                // Загружаем все версии
                const versionsResponse = await fetch(`${API_BASE}/project/${projectSlug}/version`);
                allVersions = await versionsResponse.json();

                // Получаем уникальные загрузчики
                const loadersSet = new Set();
                allVersions.forEach(version => {
                    version.loaders.forEach(loader => loadersSet.add(loader));
                });
                availableLoaders = Array.from(loadersSet).sort();

                // Переводим описание
                if (projectData.description) {
                    projectContent.innerHTML = '<div class="loading">🔄 Переводим описание...</div>';
                    await translateText(projectData.description);
                }

                // Применяем фильтры
                applyFilters();

                // Отображаем
                renderProject();

            } catch (error) {
                console.error('Ошибка:', error);
                projectContent.innerHTML = `
                    <div class="error">
                        ❌ Ошибка: ${error.message}<br>
                        <button onclick="window.location.href='/minecraft/'" style="color: var(--text-brand); margin-top: 1rem; padding: 0.5rem 1rem; background: none; border: 1px solid var(--text-brand); border-radius: 0.5rem; cursor: pointer;">Вернуться на главную</button>
                    </div>
                `;
            }
        }

        // ========== ПРИМЕНЕНИЕ ФИЛЬТРОВ ==========
        function applyFilters() {
            filteredVersions = allVersions.filter(version => {
                if (selectedLoader && !version.loaders.includes(selectedLoader)) {
                    return false;
                }
                return true;
            });
        }

        // ========== ФОРМАТИРОВАНИЕ ЧИСЕЛ ==========
        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + 'M';
            if (num >= 1_000) return (num / 1_000).toFixed(1) + 'k';
            return num.toString();
        }

        // ========== ФОРМАТИРОВАНИЕ ДАТЫ ==========
        function formatRelativeDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 7) {
                return `${diffDays} ${getDaysWord(diffDays)} назад`;
            } else if (diffDays < 30) {
                const weeks = Math.floor(diffDays / 7);
                return `${weeks} ${getWeeksWord(weeks)} назад`;
            } else if (diffDays < 365) {
                const months = Math.floor(diffDays / 30);
                return `${months} ${getMonthsWord(months)} назад`;
            } else {
                const years = Math.floor(diffDays / 365);
                return `${years} ${getYearsWord(years)} назад`;
            }
        }

        function getDaysWord(days) {
            if (days === 1) return 'день';
            if (days >= 2 && days <= 4) return 'дня';
            return 'дней';
        }

        function getWeeksWord(weeks) {
            if (weeks === 1) return 'неделю';
            if (weeks >= 2 && weeks <= 4) return 'недели';
            return 'недель';
        }

        function getMonthsWord(months) {
            if (months === 1) return 'месяц';
            if (months >= 2 && months <= 4) return 'месяца';
            return 'месяцев';
        }

        function getYearsWord(years) {
            if (years === 1) return 'год';
            if (years >= 2 && years <= 4) return 'года';
            return 'лет';
        }

        // ========== ОПРЕДЕЛЕНИЕ СТАТУСА ВЕРСИИ ==========
        function getVersionStatus(version) {
            const versionStr = version.version_number.toLowerCase();
            const gameVersions = version.game_versions.join(' ').toLowerCase();
            
            if (versionStr.includes('beta') || versionStr.includes('pre') || 
                gameVersions.includes('beta') || gameVersions.includes('pre') ||
                gameVersions.includes('snapshot') || gameVersions.includes('w')) {
                return { type: 'beta', letter: 'B' };
            }
            return { type: 'release', letter: 'R' };
        }

        // ========== ПОЛУЧЕНИЕ ОПИСАНИЯ ==========
        function getDescription() {
            if (!projectData || !projectData.description) return 'Нет описания';
            const cached = cachedTranslations.get(projectData.description);
            return cached || projectData.description;
        }

        // ========== ПОЛУЧЕНИЕ ЦВЕТА ЗАГРУЗЧИКА ==========
        function getLoaderClass(loader) {
            switch(loader.toLowerCase()) {
                case 'fabric': return 'fabric';
                case 'forge': return 'forge';
                case 'neoforge': return 'neoforge';
                case 'quilt': return 'quilt';
                default: return '';
            }
        }

        // ========== ОТРИСОВКА ==========
        function renderProject() {
            const iconUrl = projectData.icon_url || 'https://via.placeholder.com/128/2c2c30/a0a0a8?text=Mod';
            
            // Получаем ссылки
            const links = [];
            if (projectData.source_url) links.push({ type: 'source', url: projectData.source_url, name: 'Исходный код' });
            if (projectData.issues_url) links.push({ type: 'issues', url: projectData.issues_url, name: 'Сообщить о проблеме' });
            if (projectData.wiki_url) links.push({ type: 'wiki', url: projectData.wiki_url, name: 'Wiki' });
            if (projectData.discord_url) links.push({ type: 'discord', url: projectData.discord_url, name: 'Discord' });

            const description = getDescription();

            // Формируем фильтры загрузчиков
            const loaderFilters = `
                <div class="loader-badges">
                    ${availableLoaders.map(loader => `
                        <span class="loader-badge-filter ${getLoaderClass(loader)} ${selectedLoader === loader ? 'active' : ''}" 
                              data-loader="${loader}" onclick="toggleLoader('${loader}')">${loader}</span>
                    `).join('')}
                </div>
            `;

            // Пагинация
            const totalPages = Math.ceil(filteredVersions.length / VERSIONS_PER_PAGE);
            const startIndex = (currentPage - 1) * VERSIONS_PER_PAGE;
            const endIndex = Math.min(startIndex + VERSIONS_PER_PAGE, filteredVersions.length);
            const paginatedVersions = filteredVersions.slice(startIndex, endIndex);

            // Формируем кнопки пагинации
            let paginationButtons = '';
            if (totalPages > 1) {
                paginationButtons += '<div class="pagination">';
                
                paginationButtons += `
                    <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} 
                            onclick="goToPage(${currentPage - 1})">←</button>
                `;
                
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, currentPage + 2);
                
                for (let i = startPage; i <= endPage; i++) {
                    paginationButtons += `
                        <button class="page-btn ${i === currentPage ? 'active' : ''}" 
                                onclick="goToPage(${i})">${i}</button>
                    `;
                }
                
                paginationButtons += `
                    <button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} 
                            onclick="goToPage(${currentPage + 1})">→</button>
                `;
                
                paginationButtons += '</div>';
            }

            // Формируем таблицу версий
            const versionsTable = filteredVersions.length > 0 ? `
                <table class="versions-table">
                    <thead>
                        <tr>
                            <th>Версия</th>
                            <th>Загрузчики</th>
                            <th>Версии игры</th>
                            <th>Дата</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${paginatedVersions.map(version => {
                            const status = getVersionStatus(version);
                            
                            return `
                            <tr>
                                <td>
                                    <div class="version-cell">
                                        <div class="version-status ${status.type}">${status.letter}</div>
                                        <span class="version-number">${escapeHtml(version.version_number)}</span>
                                    </div>
                                </td>
                                <td>
                                    ${version.loaders.map(loader => 
                                        `<span class="loader-badge-table ${getLoaderClass(loader)}">${loader}</span>`
                                    ).join('')}
                                </td>
                                <td>
                                    <div class="game-versions">
                                        ${version.game_versions.slice(0, 3).map(gv => 
                                            `<span class="game-version">${gv}</span>`
                                        ).join('')}
                                        ${version.game_versions.length > 3 ? 
                                            `<span class="game-version">+${version.game_versions.length - 3}</span>` : ''}
                                    </div>
                                </td>
                                <td>${formatRelativeDate(version.date_published)}</td>
                                <td>
                                    <a href="${version.files[0]?.url}" class="download-btn" target="_blank">
                                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                                        Скачать
                                    </a>
                                </td>
                            </tr>
                        `}).join('')}
                    </tbody>
                </table>
                ${paginationButtons}
            ` : '<div class="no-versions">Нет версий</div>';

            // Проверяем, сохранен ли проект
            const isSaved = savedProjects.has(projectSlug);

            let html = `
                <div class="project-header">
                    <img src="${iconUrl}" class="project-icon" alt="${escapeHtml(projectData.title)}"
                         onerror="this.src='https://via.placeholder.com/128/2c2c30/a0a0a8?text=Mod'">
                    <div class="project-info">
                        <div class="project-name-row">
                            <h1 class="project-name">${escapeHtml(projectData.title)}</h1>
                            <div class="action-buttons">
                                <!-- Кнопка поделиться (квадратная) -->
                                <button class="action-btn share-btn" onclick="showShareModal()" title="Поделиться">
                                    <i class="fas fa-share-alt"></i>
                                </button>
                                <!-- Кнопка сохранить -->
                                <button class="action-btn ${isSaved ? 'saved' : ''}" id="saveProjectBtn" onclick="toggleSave()">
                                    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                                    ${isSaved ? 'Сохранено' : 'Сохранить'}
                                </button>
                                <!-- Кнопка скачать -->
                                <button class="action-btn" onclick="scrollToVersions()">
                                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                                    Скачать
                                </button>
                            </div>
                        </div>
                        <div class="project-author">by ${escapeHtml(projectData.author || 'Неизвестен')}</div>
                        <div class="project-stats">
                            <div class="stat-item">
                                <svg viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1m-4-4-4 4m0 0-4-4m4 4V4"/></svg>
                                <div>
                                    <div class="stat-value">${formatNumber(projectData.downloads)}</div>
                                    <div class="stat-label">скачиваний</div>
                                </div>
                            </div>
                            <div class="stat-item">
                                <svg viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2"/></svg>
                                <div>
                                    <div class="stat-value">${formatRelativeDate(projectData.updated)}</div>
                                    <div class="stat-label">обновлено</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="project-description">
                    ${escapeHtml(description)}
                </div>

                ${projectData.gallery && projectData.gallery.length > 0 ? `
                    <div class="gallery-section">
                        <h3 class="section-title">🖼️ Галерея</h3>
                        <div class="gallery">
                            ${projectData.gallery.map(img => `
                                <img src="${img.url}" class="gallery-image" onclick="openModal('${img.url}')">
                            `).join('')}
                        </div>
                    </div>
                ` : ''}

                <div class="project-details">
                    <div class="detail-section">
                        <h3 class="section-title">📦 Информация</h3>
                        <div class="info-grid">
                            <div><strong>Лицензия:</strong> ${escapeHtml(projectData.license?.name || 'Не указана')}</div>
                            <div><strong>Статус:</strong> ${escapeHtml(projectData.status || 'Неизвестно')}</div>
                            <div><strong>Сторона клиента:</strong> ${escapeHtml(projectData.client_side || 'Неизвестно')}</div>
                            <div><strong>Сторона сервера:</strong> ${escapeHtml(projectData.server_side || 'Неизвестно')}</div>
                            <div><strong>Дата создания:</strong> ${formatRelativeDate(projectData.published)}</div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3 class="section-title">🏷️ Категории</h3>
                        <div class="tags">
                            ${(projectData.categories || []).map(cat => 
                                `<span class="tag">${escapeHtml(cat)}</span>`
                            ).join('')}
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3 class="section-title">🔗 Ссылки</h3>
                        <div class="link-list">
                            <a href="https://modrinth.com/${projectType}/${projectSlug}" target="_blank" class="link-item">
                                <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                Страница на Modrinth
                            </a>
                            ${links.map(link => `
                                <a href="${escapeHtml(link.url)}" target="_blank" class="link-item">
                                    <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>
                                    ${escapeHtml(link.name)}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="versions-section" id="versions-section">
                    <div class="versions-header">
                        <h3 class="versions-title">📥 Версии</h3>
                        ${loaderFilters}
                    </div>
                    ${versionsTable}
                </div>
            `;

            projectContent.innerHTML = html;
        }

        // ========== ЗАЩИТА ОТ XSS ==========
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ========== СЛЕДИМ ЗА ИЗМЕНЕНИЕМ HASH ==========
        window.addEventListener('hashchange', () => {
            window.location.reload();
        });

        // Закрытие модального окна по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                document.getElementById('shareModal').classList.remove('show');
            }
        });

        // Запуск
        if (projectInfo) {
            loadProject();
        }
    </script>
</body>
</html>
