<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Мод</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            
            --color-fabric: #dbb69b;
            --color-fabric-alpha: rgba(219, 182, 155, 0.3);
            --color-forge: #959eef;
            --color-forge-alpha: rgba(149, 158, 239, 0.3);
            --color-neoforge: #f99e6b;
            --color-neoforge-alpha: rgba(249, 158, 107, 0.3);
            --color-quilt: #c796f9;
            --color-quilt-alpha: rgba(199, 150, 249, 0.3);
            
            --color-release: #2bde73;
            --color-beta: #fbbf24;
        }

        body, .project-description, .info-grid, .tag, .version-number, .game-version {
            font-weight: 450;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
            cursor: pointer;
            background: none;
            border: none;
        }

        .back-btn:hover {
            color: var(--text-brand);
        }

        .back-btn svg {
            width: 1.25rem;
            height: 1.25rem;
            stroke: currentColor;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            cursor: pointer;
        }

        .logo span {
            color: var(--text-brand);
        }

        .loading, .error {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .error {
            color: #ef4444;
        }

        .project-header {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            position: relative;
        }

        .project-icon {
            width: 128px;
            height: 128px;
            border-radius: 1rem;
            background-color: var(--bg-button);
            object-fit: cover;
        }

        .project-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .project-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.5rem;
            width: 100%;
        }

        .project-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-contrast);
            line-height: 1.2;
        }

        .download-top-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--bg-brand);
            color: var(--text-brand);
            padding: 0.6rem 1.2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .download-top-btn:hover {
            background-color: var(--text-brand);
            color: var(--bg-body);
        }

        .download-top-btn svg {
            width: 1.2rem;
            height: 1.2rem;
            stroke: currentColor;
        }

        .project-author {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .project-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-item svg {
            width: 1.5rem;
            height: 1.5rem;
            stroke: currentColor;
            fill: none;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-contrast);
        }

        .stat-label {
            font-size: 0.9rem;
        }

        .project-description {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 2rem;
            background-color: var(--bg-raised);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .gallery-section {
            margin-bottom: 2rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .gallery-image {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--border-subtle);
        }

        .gallery-image:hover {
            transform: scale(1.02);
            border-color: var(--text-brand);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 2rem;
            color: white;
            font-size: 3rem;
            cursor: pointer;
        }

        .project-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .detail-section {
            background-color: var(--bg-raised);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-contrast);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            color: var(--text-primary);
        }

        .info-grid strong {
            color: var(--text-contrast);
            font-weight: 600;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 9999px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .link-item:hover {
            background-color: var(--bg-button);
            color: var(--text-brand);
        }

        .link-item svg {
            width: 1.25rem;
            height: 1.25rem;
            stroke: currentColor;
        }

        .versions-section {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .versions-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .versions-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-contrast);
            margin-bottom: 1rem;
        }

        .loader-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .loader-badge-filter {
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .loader-badge-filter:hover {
            filter: brightness(1.2);
        }

        .loader-badge-filter.active {
            border-color: var(--text-brand);
            box-shadow: 0 0 0 1px var(--text-brand);
        }

        .loader-badge-filter[data-loader="fabric"] { background-color: var(--color-fabric); color: white; }
        .loader-badge-filter[data-loader="forge"] { background-color: var(--color-forge); color: white; }
        .loader-badge-filter[data-loader="neoforge"] { background-color: var(--color-neoforge); color: white; }
        .loader-badge-filter[data-loader="quilt"] { background-color: var(--color-quilt); color: white; }

        .versions-table {
            width: 100%;
            border-collapse: collapse;
        }

        .versions-table th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-subtle);
            background-color: rgba(0, 0, 0, 0.2);
        }

        .versions-table td {
            padding: 1rem 1.5rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
        }

        .versions-table tr:hover td {
            background-color: var(--bg-button);
        }

        .version-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .version-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .version-status.release { background-color: var(--color-release); color: #000; }
        .version-status.beta { background-color: var(--color-beta); color: #000; }

        .version-number {
            font-weight: 600;
            color: var(--text-contrast);
            font-size: 1rem;
        }

        /* --- ИЗМЕНЕНИЯ ЗДЕСЬ --- */
        .loader-badge-table {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 0.25rem;
            margin-bottom: 0.25rem;
            background-color: rgba(128, 128, 128, 0.5) !important; /* Серый 50% */
        }

        .loader-badge-table.fabric { color: var(--color-fabric); }
        .loader-badge-table.forge { color: var(--color-forge); }
        .loader-badge-table.neoforge { color: var(--color-neoforge); }
        .loader-badge-table.quilt { color: var(--color-quilt); }
        /* ----------------------- */

        .game-versions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .game-version {
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 0.25rem;
            padding: 0.15rem 0.4rem;
            font-size: 0.75rem;
            color: var(--text-primary);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--bg-brand);
            color: var(--text-brand);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .download-btn:hover {
            background-color: var(--text-brand);
            color: var(--bg-body);
        }

        .download-btn svg {
            width: 1rem;
            height: 1rem;
            stroke: currentColor;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.1s;
            padding: 0 0.5rem;
        }

        .page-btn:hover:not(:disabled) {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .page-btn.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
            border-color: var(--text-brand);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-versions {
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="modal" id="galleryModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <div class="container">
        <div class="nav-bar">
            <button class="back-btn" onclick="window.location.href='/minecraft/'">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                На главную
            </button>
            <div class="logo" onclick="window.location.href='/minecraft/'">Deynik <span>Minecraft</span></div>
        </div>

        <div id="projectContent">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.modrinth.com/v2';
        const TRANSLATE_API = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=';

        function getProjectInfoFromUrl() {
            const hash = window.location.hash.substring(1);
            const parts = hash.split('/');
            if (parts.length >= 2) return { type: parts[0], slug: parts[1] };
            return null;
        }

        const projectInfo = getProjectInfoFromUrl();
        const projectContent = document.getElementById('projectContent');
        
        if (!projectInfo) {
            projectContent.innerHTML = `<div class="error">❌ Не указан проект</div>`;
        }

        const projectType = projectInfo.type;
        const projectSlug = projectInfo.slug;

        let projectData = null;
        let allVersions = [];
        let filteredVersions = [];
        let cachedTranslations = new Map();
        let selectedLoader = null;
        const VERSIONS_PER_PAGE = 10;
        let currentPage = 1;
        let availableLoaders = [];

        async function translateText(text) {
            if (!text || text.length < 20) return text;
            if (cachedTranslations.has(text)) return cachedTranslations.get(text);
            try {
                const response = await fetch(TRANSLATE_API + encodeURIComponent(text));
                const data = await response.json();
                const translated = data[0][0][0];
                cachedTranslations.set(text, translated);
                return translated;
            } catch (error) { return text; }
        }

        window.openModal = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('galleryModal').classList.add('show');
        };

        window.closeModal = function() {
            document.getElementById('galleryModal').classList.remove('show');
        };

        window.scrollToVersions = function() {
            document.getElementById('versions-section').scrollIntoView({ behavior: 'smooth' });
        };

        window.toggleLoader = function(loader) {
            selectedLoader = (selectedLoader === loader) ? null : loader;
            currentPage = 1;
            applyFilters();
            renderProject();
        };

        window.goToPage = function(page) {
            currentPage = page;
            renderProject();
        };

        async function loadProject() {
            try {
                const projectResponse = await fetch(`${API_BASE}/project/${projectSlug}`);
                projectData = await projectResponse.json();
                const versionsResponse = await fetch(`${API_BASE}/project/${projectSlug}/version`);
                allVersions = await versionsResponse.json();

                const loadersSet = new Set();
                allVersions.forEach(v => v.loaders.forEach(l => loadersSet.add(l)));
                availableLoaders = Array.from(loadersSet).sort();

                if (projectData.description) await translateText(projectData.description);
                applyFilters();
                renderProject();
            } catch (error) {
                projectContent.innerHTML = `<div class="error">❌ Ошибка: ${error.message}</div>`;
            }
        }

        function applyFilters() {
            filteredVersions = allVersions.filter(v => !selectedLoader || v.loaders.includes(selectedLoader));
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num || '0';
        }

        function formatRelativeDate(dateString) {
            const diffDays = Math.ceil(Math.abs(new Date() - new Date(dateString)) / (1000 * 60 * 60 * 24));
            if (diffDays < 7) return `${diffDays} дн. назад`;
            return new Date(dateString).toLocaleDateString();
        }

        function getVersionStatus(version) {
            const str = (version.version_number + version.game_versions.join('')).toLowerCase();
            return (str.includes('beta') || str.includes('pre') || str.includes('snapshot')) ? { type: 'beta', letter: 'B' } : { type: 'release', letter: 'R' };
        }

        function getLoaderClass(loader) {
            const l = loader.toLowerCase();
            if (l.includes('fabric')) return 'fabric';
            if (l.includes('neoforge')) return 'neoforge';
            if (l.includes('forge')) return 'forge';
            if (l.includes('quilt')) return 'quilt';
            return '';
        }

        function renderProject() {
            const iconUrl = projectData.icon_url || '';
            const description = cachedTranslations.get(projectData.description) || projectData.description || '';
            
            const totalPages = Math.ceil(filteredVersions.length / VERSIONS_PER_PAGE);
            const paginatedVersions = filteredVersions.slice((currentPage - 1) * VERSIONS_PER_PAGE, currentPage * VERSIONS_PER_PAGE);

            let versionsTable = filteredVersions.length > 0 ? `
                <table class="versions-table">
                    <thead><tr><th>Версия</th><th>Загрузчики</th><th>Версии</th><th>Дата</th><th></th></tr></thead>
                    <tbody>
                        ${paginatedVersions.map(v => {
                            const status = getVersionStatus(v);
                            return `<tr>
                                <td><div class="version-cell"><div class="version-status ${status.type}">${status.letter}</div><span class="version-number">${escapeHtml(v.version_number)}</span></div></td>
                                <td>
                                    ${v.loaders
                                        .filter(l => l.toLowerCase() !== 'datapack') /* УБРАН DATAPACK */
                                        .map(l => `<span class="loader-badge-table ${getLoaderClass(l)}">${l}</span>`).join('')}
                                </td>
                                <td><div class="game-versions">${v.game_versions.slice(0, 3).map(gv => `<span class="game-version">${gv}</span>`).join('')}</div></td>
                                <td>${formatRelativeDate(v.date_published)}</td>
                                <td><a href="${v.files[0]?.url}" class="download-btn" target="_blank">Скачать</a></td>
                            </tr>`}).join('')}
                    </tbody>
                </table>` : '<div class="no-versions">Нет версий</div>';

            projectContent.innerHTML = `
                <div class="project-header">
                    <img src="${iconUrl}" class="project-icon">
                    <div class="project-info">
                        <div class="project-name-row"><h1 class="project-name">${escapeHtml(projectData.title)}</h1><button class="download-top-btn" onclick="scrollToVersions()">Скачать</button></div>
                        <div class="project-author">by ${escapeHtml(projectData.author)}</div>
                        <div class="project-stats">
                            <div class="stat-item"><div class="stat-value">${formatNumber(projectData.downloads)}</div><div class="stat-label">скачиваний</div></div>
                            <div class="stat-item"><div class="stat-value">${formatRelativeDate(projectData.updated)}</div><div class="stat-label">обновлено</div></div>
                        </div>
                    </div>
                </div>
                <div class="project-description">${escapeHtml(description)}</div>
                <div class="versions-section" id="versions-section">
                    <div class="versions-header"><h3 class="versions-title">📥 Версии</h3></div>
                    ${versionsTable}
                </div>`;
        }

        function escapeHtml(unsafe) {
            return String(unsafe || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m]));
        }

        if (projectInfo) loadProject();
    </script>
</body>
</html>
