<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Сохраненные</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 100%;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
        }

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.8rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-subtle);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 2rem;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .saved-header {
            margin-bottom: 2rem;
        }

        .saved-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-contrast);
        }

        .saved-title span {
            color: var(--text-brand);
        }

        .saved-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .saved-card {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.2s;
        }

        .saved-card:hover {
            transform: translateY(-2px);
            border-color: var(--text-brand);
        }

        .saved-card-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .saved-icon {
            width: 56px;
            height: 56px;
            border-radius: 0.75rem;
            background-color: var(--bg-button);
            object-fit: cover;
        }

        .saved-card-info {
            flex: 1;
        }

        .saved-name {
            font-weight: 600;
            color: var(--text-contrast);
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .saved-type {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .saved-author {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .saved-description {
            color: var(--text-primary);
            font-size: 0.85rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }

        .saved-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            border-top: 1px solid var(--border-subtle);
            padding-top: 0.75rem;
        }

        .saved-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .saved-action-btn:hover {
            background-color: var(--bg-button);
            color: var(--text-brand);
        }

        .loading, .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar"></div>

        <div class="main-content">
            <div class="content-wrapper">
                <div class="saved-header">
                    <h1 class="saved-title">Сохраненные <span>проекты</span></h1>
                </div>
                <div class="saved-grid" id="savedGrid">
                    <div class="loading">Загрузка сохраненных проектов...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="/minecraft/common.js"></script>
    <script>
        const savedGrid = document.getElementById('savedGrid');
        
        window.loadSidebar();
        
        async function loadSavedProjects() {
            if (!window.currentUser) {
                savedGrid.innerHTML = '<div class="empty-state">🔒 Войдите, чтобы увидеть сохраненные проекты</div>';
                return;
            }
            
            try {
                const savedRef = db.collection('saved').doc(window.currentUser.uid);
                const doc = await savedRef.get();
                
                if (!doc.exists || !doc.data().projects || doc.data().projects.length === 0) {
                    savedGrid.innerHTML = '<div class="empty-state">📚 У вас пока нет сохраненных проектов</div>';
                    return;
                }
                
                const savedIds = doc.data().projects;
                const projectsData = doc.data().projectsData || {};
                
                let html = '';
                for (const id of savedIds) {
                    const data = projectsData[id];
                    if (data) {
                        const typeNames = {
                            'mod': 'Мод', 'shader': 'Шейдер', 'resourcepack': 'Ресурспак',
                            'modpack': 'Сборка', 'plugin': 'Плагин', 'datapack': 'Датапак'
                        };
                        html += `
                            <div class="saved-card" onclick="window.location.href='/minecraft/project.html#${data.type}/${data.slug}'">
                                <div class="saved-card-header">
                                    <img src="${data.icon || 'https://via.placeholder.com/56/2c2c30/a0a0a8?text=Mod'}" 
                                         class="saved-icon" onerror="this.src='https://via.placeholder.com/56/2c2c30/a0a0a8?text=Mod'">
                                    <div class="saved-card-info">
                                        <div class="saved-name">${window.escapeHtml(data.title)}</div>
                                        <div class="saved-type">${typeNames[data.type] || data.type}</div>
                                        <div class="saved-author">${window.escapeHtml(data.author || 'Неизвестен')}</div>
                                    </div>
                                </div>
                                <div class="saved-description">${window.escapeHtml(data.description || 'Нет описания')}</div>
                                <div class="saved-actions">
                                    <button class="saved-action-btn" onclick="event.stopPropagation(); removeSaved('${id}')">
                                        <i class="fas fa-trash-alt"></i> Удалить
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                }
                
                savedGrid.innerHTML = html;
                
            } catch (error) {
                console.error('Ошибка:', error);
                savedGrid.innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
            }
        }
        
        window.removeSaved = async function(projectId) {
            if (!window.currentUser) return;
            
            try {
                const savedRef = db.collection('saved').doc(window.currentUser.uid);
                window.savedProjects.delete(projectId);
                
                const doc = await savedRef.get();
                const currentProjects = doc.exists ? doc.data().projects || [] : [];
                const projectsData = doc.exists ? doc.data().projectsData || {} : {};
                
                delete projectsData[projectId];
                
                await savedRef.set({
                    projects: currentProjects.filter(id => id !== projectId),
                    projectsData: projectsData
                });
                
                window.showToast('Проект удален из сохраненных', 'success');
                loadSavedProjects();
            } catch (error) {
                console.error('Ошибка удаления:', error);
                window.showToast('Ошибка при удалении', 'error');
            }
        };
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                window.currentUser = user;
                await window.loadSavedProjects();
                loadSavedProjects();
            } else {
                window.currentUser = null;
                savedGrid.innerHTML = '<div class="empty-state">🔒 Войдите, чтобы увидеть сохраненные проекты</div>';
            }
        });
    </script>
</body>
</html>
