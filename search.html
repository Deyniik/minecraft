<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deynik Minecraft - Поиск</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0f0f11;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }

        .app-container {
            display: flex;
            width: 100%;
            max-width: 1600px;
        }

        :root {
            --bg-body: #0f0f11;
            --bg-raised: #1c1c1f;
            --bg-button: #2c2c30;
            --bg-button-hover: #3a3a40;
            --bg-selected: #3b3b45;
            --text-contrast: #ffffff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a8;
            --text-brand: #fbbf24;
            --bg-brand: rgba(251, 191, 36, 0.15);
            --border-subtle: #2c2c32;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        /* Боковая панель */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background-color: var(--bg-body);
            padding: 1.5rem 0.5rem;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-button) var(--bg-body);
            border-right: 1px solid var(--border-subtle);
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-body);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--bg-button);
            border-radius: 4px;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
            padding-left: 0.5rem;
            cursor: pointer;
        }

        .sidebar-logo span {
            color: var(--text-brand);
        }

        .sidebar-category {
            margin-bottom: 1.5rem;
        }

        .sidebar-category-title {
            padding: 0.5rem 0.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .sidebar-item:hover {
            background-color: var(--bg-button);
            color: var(--text-contrast);
        }

        .sidebar-item.active {
            background-color: var(--bg-brand);
            color: var(--text-brand);
        }

        .sidebar-item svg {
            width: 1.3rem;
            height: 1.3rem;
            stroke: currentColor;
            fill: none;
        }

        .user-section {
            margin-top: auto;
            padding: 1rem 0.5rem;
            border-top: 1px solid var(--border-subtle);
            margin-top: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            background-color: var(--bg-button);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--text-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
        }

        .user-details {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            color: var(--text-contrast);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
        }

        .user-nick {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.6rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-contrast);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .google-btn:hover {
            background-color: var(--bg-button-hover);
            border-color: var(--text-brand);
        }

        .google-btn svg {
            width: 1.1rem;
            height: 1.1rem;
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .search-logo {
            font-size: 4rem;
            font-weight: 800;
            color: var(--text-contrast);
            margin-bottom: 2rem;
        }

        .search-logo span {
            color: var(--text-brand);
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3.5rem;
            background-color: var(--bg-raised);
            border: 2px solid var(--border-subtle);
            border-radius: 3rem;
            color: var(--text-contrast);
            font-size: 1.2rem;
            transition: all 0.2s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--text-brand);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1.5rem;
            height: 1.5rem;
            stroke: var(--text-secondary);
        }

        .type-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }

        .type-tag {
            padding: 0.5rem 1.2rem;
            background-color: var(--bg-button);
            border: 1px solid var(--border-subtle);
            border-radius: 2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .type-tag:hover {
            background-color: var(--bg-brand);
            color: var(--text-brand);
            border-color: var(--text-brand);
        }

        .results-container {
            width: 100%;
            max-width: 800px;
            margin-top: 2rem;
            display: none;
        }

        .results-container.show {
            display: block;
        }

        .results-header {
            text-align: left;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .result-card {
            background-color: var(--bg-raised);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-card:hover {
            transform: translateY(-2px);
            border-color: var(--text-brand);
        }

        .result-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .result-icon {
            width: 48px;
            height: 48px;
            border-radius: 0.5rem;
            background-color: var(--bg-button);
            object-fit: cover;
        }

        .result-title {
            flex: 1;
        }

        .result-name {
            font-weight: 600;
            color: var(--text-contrast);
            font-size: 1rem;
        }

        .result-type {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .result-description {
            color: var(--text-primary);
            font-size: 0.85rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-logo" onclick="window.location.href='/minecraft/'">Deynik <span>Minecraft</span></div>
            
            <!-- Категория 1: Главное -->
            <div class="sidebar-category">
                <div class="sidebar-category-title">Главное</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="window.location.href='/minecraft/'">
                        <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9z"/><path d="M9 21v-6h6v6"/></svg>
                        Рекомендации
                    </button>
                    <button class="sidebar-item active" onclick="window.location.href='/minecraft/search.html'">
                        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Поиск
                    </button>
                    <button class="sidebar-item" id="savedBtn">
                        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                        Сохраненные
                    </button>
                    <button class="sidebar-item" id="messengerBtn">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Мессенджер
                    </button>
                </div>
            </div>

            <!-- Категория 2: Контент -->
            <div class="sidebar-category">
                <div class="sidebar-category-title">Контент</div>
                <div class="sidebar-menu">
                    <button class="sidebar-item" onclick="document.querySelector('.search-input').focus(); document.querySelector('.search-input').value = 'мод '; performSearch('мод')">
                        <svg viewBox="0 0 24 24"><path d="M20 7h-4.5L15 4H9L8.5 7H4v2h16V7z"/><rect x="4" y="9" width="16" height="10" rx="1"/><circle cx="8" cy="13" r="1"/><circle cx="16" cy="13" r="1"/></svg>
                        Моды
                    </button>
                    <button class="sidebar-item" onclick="document.querySelector('.search-input').focus(); document.querySelector('.search-input').value = 'шейдер '; performSearch('шейдер')">
                        <svg viewBox="0 0 24 24"><path d="M12 3v1M5 8h1M18 8h1M8 21h8M12 8v8"/><circle cx="12" cy="15" r="3"/><path d="M8 11L5 8M16 11l3-3"/></svg>
                        Шейдеры
                    </button>
                    <button class="sidebar-item" onclick="document.querySelector('.search-input').focus(); document.querySelector('.search-input').value = 'текстур пак '; performSearch('текстур пак')">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M9 9l6 6M15 9l-6 6"/></svg>
                        Ресурспаки
                    </button>
                    <button class="sidebar-item" onclick="document.querySelector('.search-input').focus(); document.querySelector('.search-input').value = 'сборка '; performSearch('сборка')">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16v2H4z"/><rect x="4" y="8" width="16" height="12" rx="1"/><path d="M10 12l2 2 4-4"/></svg>
                        Сборки
                    </button>
                    <button class="sidebar-item" onclick="document.querySelector('.search-input').focus(); document.querySelector('.search-input').value = 'плагин '; performSearch('плагин')">
                        <svg viewBox="0 0 24 24"><path d="M20 12v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4"/><rect x="4" y="4" width="16" height="8" rx="1"/><circle cx="12" cy="12" r="2"/></svg>
                        Плагины
                    </button>
                    <button class="sidebar-item" onclick="document.querySelector('.search-input').focus(); document.querySelector('.search-input').value = 'датапак '; performSearch('датапак')">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M8 8h8v8H8z"/><path d="M12 12l2-2-2-2"/></svg>
                        Датапаки
                    </button>
                </div>
            </div>

            <!-- Пользовательская секция -->
            <div class="user-section" id="userSection">
                <div id="userInfo" style="display: none;">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar"></div>
                        <div class="user-details">
                            <div class="user-name" id="userName"></div>
                            <div class="user-nick" id="userNick"></div>
                        </div>
                    </div>
                </div>
                <button class="google-btn" id="googleSignInBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Войти через Google
                </button>
            </div>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <div class="search-container">
                <div class="search-logo">Deynik <span>Minecraft</span></div>
                
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input type="text" class="search-input" placeholder="Найдется всё!" id="searchInput" autofocus>
                </div>

                <div class="type-tags" id="typeTags">
                    <span class="type-tag" data-type="mod">Моды</span>
                    <span class="type-tag" data-type="shader">Шейдеры</span>
                    <span class="type-tag" data-type="resourcepack">Ресурспаки</span>
                    <span class="type-tag" data-type="modpack">Сборки</span>
                    <span class="type-tag" data-type="plugin">Плагины</span>
                    <span class="type-tag" data-type="datapack">Датапаки</span>
                </div>

                <div class="results-container" id="resultsContainer">
                    <div class="results-header" id="resultsHeader"></div>
                    <div class="results-grid" id="resultsGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyBk4nxZ1ldNQUCxsbgaeYTkm9stq0o9o2Q",
            authDomain: "deygram-e4814.firebaseapp.com",
            projectId: "deygram-e4814",
            storageBucket: "deygram-e4814.firebasestorage.app",
            messagingSenderId: "591207353726",
            appId: "1:591207353726:web:d20f5e648d3daf86fcb72f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const API_BASE = 'https://api.modrinth.com/v2';
        const TRANSLATE_API = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=';

        let currentUser = null;
        let searchTimeout;
        let currentType = null;
        let cachedTranslations = new Map();

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const resultsHeader = document.getElementById('resultsHeader');
        const resultsGrid = document.getElementById('resultsGrid');
        const typeTags = document.querySelectorAll('.type-tag');

        // Auth
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('googleSignInBtn').style.display = 'none';
                document.getElementById('userName').textContent = user.displayName || 'Пользователь';
                document.getElementById('userNick').textContent = `@${user.email.split('@')[0]}`;
                document.getElementById('userAvatar').textContent = (user.displayName || 'U')[0].toUpperCase();
            } else {
                currentUser = null;
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('googleSignInBtn').style.display = 'flex';
            }
        });

        document.getElementById('googleSignInBtn').addEventListener('click', () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        });

        document.getElementById('savedBtn').addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы увидеть сохраненные проекты');
                return;
            }
            window.location.href = '/minecraft/saved.html';
        });

        document.getElementById('messengerBtn').addEventListener('click', () => {
            if (!currentUser) {
                alert('Войдите, чтобы использовать мессенджер');
                return;
            }
            window.location.href = '/minecraft/messenger.html';
        });

        // Получаем тип из URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlType = urlParams.get('type');
        if (urlType) {
            currentType = urlType;
            searchInput.value = `${urlType} `;
            performSearch(urlType);
        }

        // Поиск
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                if (searchInput.value.length > 2) {
                    performSearch(searchInput.value);
                } else {
                    resultsContainer.classList.remove('show');
                }
            }, 500);
        });

        // Клик по тегам
        typeTags.forEach(tag => {
            tag.addEventListener('click', () => {
                const type = tag.dataset.type;
                currentType = type;
                searchInput.value = `${type} `;
                searchInput.focus();
                performSearch(type);
            });
        });

        async function translateText(text) {
            if (!text || text.length < 20) return text;
            if (cachedTranslations.has(text)) return cachedTranslations.get(text);
            try {
                const response = await fetch(TRANSLATE_API + encodeURIComponent(text));
                const data = await response.json();
                const translated = data[0][0][0];
                cachedTranslations.set(text, translated);
                return translated;
            } catch (error) {
                return text;
            }
        }

        async function performSearch(query) {
            resultsContainer.classList.add('show');
            resultsGrid.innerHTML = '<div class="loading">Поиск...</div>';

            try {
                const facets = [];
                if (currentType) {
                    facets.push([`project_type:${currentType}`]);
                }

                const url = `${API_BASE}/search?limit=20&query=${encodeURIComponent(query)}&facets=${encodeURIComponent(JSON.stringify(facets))}`;
                const response = await fetch(url);
                const data = await response.json();

                resultsHeader.textContent = `Найдено проектов: ${data.total_hits}`;

                if (data.hits.length === 0) {
                    resultsGrid.innerHTML = '<div class="loading">Ничего не найдено</div>';
                    return;
                }

                const projects = data.hits;
                
                // Переводим описания
                for (const project of projects) {
                    if (project.description) {
                        project.description = await translateText(project.description);
                    }
                }

                let html = '';
                for (const project of projects) {
                    html += `
                        <div class="result-card" onclick="window.location.href='/minecraft/${project.project_type}.html#${project.project_type}/${project.slug}'">
                            <div class="result-header">
                                <img src="${project.icon_url || 'https://via.placeholder.com/48/2c2c30/a0a0a8?text=Mod'}" 
                                     class="result-icon" onerror="this.src='https://via.placeholder.com/48/2c2c30/a0a0a8?text=Mod'">
                                <div class="result-title">
                                    <div class="result-name">${escapeHtml(project.title)}</div>
                                    <div class="result-type">${project.project_type}</div>
                                </div>
                            </div>
                            <div class="result-description">${escapeHtml(project.description || 'Нет описания')}</div>
                        </div>
                    `;
                }

                resultsGrid.innerHTML = html;

            } catch (error) {
                console.error(error);
                resultsGrid.innerHTML = '<div class="loading">Ошибка поиска</div>';
            }
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
